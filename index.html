<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة حروف - التصميم الجديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            min-height: 100vh; color: white; margin: 0; overflow: hidden;
        }

        .game-wrapper {
            display: grid; grid-template-columns: 1fr 380px;
            gap: 20px; padding: 30px; max-width: 1500px; margin: 0 auto; height: 90vh; align-items: center;
        }

        /* حاوية لوحة الحروف المستوحاة من الصور */
        .board-section {
            background: url('IMG_1493.webp');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            height: 100%; display: flex; justify-content: center; align-items: center;
            position: relative; border-radius: 20px;
        }

        .hex-grid {
            display: flex; flex-direction: column; align-items: center; margin-top: 10px;
        }

        .hex-row { display: flex; margin-bottom: -15px; }
        .hex-row:nth-child(even) { transform: translateX(38px); }

        .hexagon {
            width: 72px; height: 82px; background: white;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 2rem; font-weight: 900;
            color: #4c1d95; margin: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* حالات الألوان حسب الصور المرفقة */
        .state-1 { background: #facc15 !important; color: black; } /* أصفر */
        .state-2 { background: #22c55e !important; color: white; } /* أخضر */
        .state-3 { background: #f97316 !important; color: white; } /* برتقالي */

        /* اللوحة الجانبية المستوحاة من IMG_1490 */
        .side-panel {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 25px; display: flex; flex-direction: column; gap: 15px;
            height: 100%; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .result-card {
            border-radius: 15px; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; font-size: 1.2rem; font-weight: 900;
        }

        .btn-action {
            width: 100%; padding: 15px; border-radius: 15px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s; background: rgba(255,255,255,0.15);
        }
        .btn-action:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }

        .question-display {
            background: #ef4444; border-radius: 20px; padding: 20px; text-align: center;
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="board-section">
            <div id="grid-container" class="hex-grid"></div>
        </div>

        <div class="side-panel">
            <div class="text-center font-black text-xl mb-2 text-yellow-400">لوحة النتائج</div>
            
            <div class="result-card bg-orange-500">
                <span>فريق واحد</span>
                <span id="score1">0 فوز</span>
            </div>
            
            <div class="result-card bg-green-500">
                <span>فريق اثنين</span>
                <span id="score2">0 فوز</span>
            </div>

            <div class="question-display">
                <div class="bg-white text-red-600 w-12 h-12 mx-auto rounded-lg flex items-center justify-center text-2xl font-black mb-4" id="active-letter">-</div>
                <p id="question-text" class="text-lg font-bold">اضغط على حرف لبدء السؤال..</p>
                <button class="mt-4 bg-white/20 py-2 rounded-full text-sm font-bold">اضغط للإجابة</button>
            </div>

            <button onclick="shuffleLetters()" class="btn-action">
                <span>🎲</span> توزيع عشوائي
            </button>
            <button onclick="resetBoard()" class="btn-action">
                <span>🗑️</span> تفريغ اللوحة
            </button>
            <button class="btn-action bg-purple-500/50">
                <span>🎨</span> الإعدادات
            </button>
        </div>
    </div>

    <div id="win-screen" class="overlay">
        <h1 id="win-title" class="text-6xl font-black text-yellow-400 mb-4"></h1>
        <p id="win-sub" class="text-3xl font-bold"></p>
    </div>

    <audio id="win-audio" src="win.mp3"></audio>

    <script>
        const letters = "أبتثجحخدذرزسشصضطظعغفقلمنهوي".split("");
        let s1 = 0, s2 = 0, currentRound = 1, locked = false;

        function createGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            let pool = [...letters].sort(() => 0.5 - Math.random()).slice(0, 25);
            
            for (let r = 0; r < 5; r++) {
                const row = document.createElement('div');
                row.className = 'hex-row';
                for (let c = 0; c < 5; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hexagon';
                    hex.innerText = pool[r * 5 + c];
                    hex.dataset.state = "0";
                    hex.onclick = () => {
                        if(locked) return;
                        document.getElementById('active-letter').innerText = hex.innerText;
                        let s = (parseInt(hex.dataset.state) + 1) % 4;
                        hex.dataset.state = s;
                        hex.className = `hexagon state-${s}`;
                        checkGame();
                    };
                    row.appendChild(hex);
                }
                container.appendChild(row);
            }
        }

        function checkGame() {
            // منطق التحقق من المسار (مبسط للعرض)
            // إذا تحقق شرط الفوز لأحد الفريقين يتم استدعاء winRound(team)
        }

        function winRound(team) {
            locked = true;
            if(team === 1) s1++; else s2++;
            document.getElementById('score1').innerText = `${s1} فوز`;
            document.getElementById('score2').innerText = `${s2} فوز`;

            const winOverlay = document.getElementById('win-screen');
            const winTitle = document.getElementById('win-title');
            const audio = document.getElementById('win-audio');

            if(s1 === 2 || s2 === 2) {
                winTitle.innerText = "بطل المسابقة!";
                audio.play();
                startCelebration(11000);
                setTimeout(() => location.reload(), 11500);
            } else {
                winTitle.innerText = `الفائز بالجولة ${currentRound}`;
                setTimeout(() => {
                    currentRound++;
                    locked = false;
                    createGrid();
                }, 4000);
            }
            winOverlay.style.display = 'flex';
            setTimeout(() => winOverlay.style.display = 'none', 4000);
        }

        function startCelebration(time) {
            var end = Date.now() + time;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function shuffleLetters() { if(!locked) createGrid(); }
        function resetBoard() { document.querySelectorAll('.hexagon').forEach(h => { h.className = 'hexagon'; h.dataset.state = "0"; }); }

        createGrid();
    </script>
</body>
</html>
