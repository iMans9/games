<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الألعاب الاحترافية</title>
    <style>
        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --accent-color: #f093fb;
            --bg-dark: #0f0c29;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* خلفية متحركة خفيفة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.1), transparent);
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        header {
            margin-top: 50px;
            text-align: center;
            perspective: 1000px;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,242,254,0.4));
            transform: rotateX(10deg);
        }

        .container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 50px;
            perspective: 1000px;
        }

        /* تصميم الكروت الثلاثي الأبعاد */
        .game-card {
            width: 300px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .game-card:hover {
            transform: translateY(-15px) rotateY(10deg) rotateX(5deg);
            border-color: var(--primary-color);
            box-shadow: 0 30px 60px rgba(0, 242, 254, 0.3);
        }

        /* تأثير الضوء داخل الكرت */
        .game-card::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .game-card:hover::after {
            left: 100%;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 0.9rem;
            color: #ccc;
            padding: 0 20px;
            text-align: center;
        }

        /* زر الدخول */
        .play-btn {
            margin-top: 25px;
            padding: 10px 30px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            color: white;
            cursor: pointer;
        }

        .game-card:hover .play-btn {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary-color);
        }

        /* تأثير خاص بلعبة الفانوس */
        .lantern-glow {
            color: #ffd700;
            text-shadow: 0 0 20px #ffae00;
        }

        /* تأثير خاص بلعبة الحروف */
        .letters-style {
            color: #00f2fe;
            text-shadow: 0 0 15px #00f2fe;
        }

    </style>
</head>
<body>

    <header>
        <h1>مجموعة الإلعاب الجماعية</h1>
        <p>اختر اللعبة بالضغط على ابدأ اللعبة</p>
    </header>

    <div class="container">
        
        <a href="https://imans9.github.io/horof/" class="game-card">
            <img src="https://raw.githubusercontent.com/iMans9/games/refs/heads/main/logo-hororf.png" width="140px" height="140px">
            <div class="game-title">لعبة الحروف</div>
            <div class="game-desc">سباق الحروف لتوصيل مسار بين طرفين.</div>
            <button class="play-btn">ابدأ اللعبة</button>
        </a>

        <a href="https://imans9.github.io/fanos/index.html" class="game-card">
            <img src="https://raw.githubusercontent.com/iMans9/games/refs/heads/main/fanos-logo.png" width="240px" height="140px">
            <div class="game-title">دوامة الحظ</div>
            <div class="game-desc">لف الدوامة، خمن الحروف، واكسب الجوائز.</div>
            <button class="play-btn">ابدأ اللعبة</button>
        </a>


        <a href="https://imans9.github.io/top10" class="game-card">
            <img src="https://raw.githubusercontent.com/iMans9/top10/refs/heads/main/top10.png" width="240px" height="140px">
            <div class="game-title">توب 10</div>
            <div class="game-desc">خمن اكثر اشياء وجمع نقاطها</div>
            <button class="play-btn">ابدأ اللعبة</button>
        </a>

    </div>

    <script>
        // إضافة تأثير تتبع حركة الماوس لجعل الكروت تتفاعل مع الزاوية
        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                let rect = card.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                
                let centerX = rect.width / 2;
                let centerY = rect.height / 2;
                
                let rotateX = (y - centerY) / 10;
                let rotateY = (centerX - x) / 10;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0px)`;
            });
        });
    </script>
</body>
</html>
