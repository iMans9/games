<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة حروف - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@700&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hex-default: #FDFFCD;
            --hex-green: #38a169;
            --hex-orange: #f97316;
            --hex-yellow: #facc15;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); 
            min-height: 100vh; color: white; margin: 0; overflow-x: hidden;
        }

        .game-container {
            display: grid; grid-template-columns: 1fr 340px;
            gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto;
        }

        .hex-table {
            background-color: rgba(0,0,0,0.3);
            padding: 40px 10px; border-radius: 2rem;
            display: flex; flex-direction: column; align-items: center;
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            background-image: url('IMG_1493.webp');
            background-size: cover; background-blend-mode: overlay;
        }

        .hex-row {
            display: flex;
            justify-content: center;
            margin-top: -18px; 
        }

        .hex {
            position: relative;
            width: 75px; height: 86px;
            background-color: var(--hex-default);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin: 2px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'El Messiri', sans-serif;
            font-size: 2rem; font-weight: bold; color: #2d3748;
            cursor: pointer; transition: all 0.2s ease;
            user-select: none;
        }

        /* إزاحة الصفوف الزوجية */
        .hex-row:nth-child(even) { transform: translateX(39px); }

        .hex.active-yellow { background-color: var(--hex-yellow) !important; color: #000; }
        .hex.active-green { background-color: var(--hex-green) !important; color: #fff; }
        .hex.active-orange { background-color: var(--hex-orange) !important; color: #fff; }

        /* جدران 6 خلايا */
        .hex.edge-green { background-color: #0aad56 !important; color: transparent !important; cursor: default; }
        .hex.edge-orange { background-color: #ff4400 !important; color: transparent !important; cursor: default; }
        .hex.empty { visibility: hidden; pointer-events: none; }

        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .score-box { padding: 15px; border-radius: 1.5rem; text-align: center; border-bottom: 5px solid rgba(0,0,0,0.2); }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; text-align: center;
        }
        .show-overlay { display: flex; }

        @media (max-width: 1024px) {
            .game-container { grid-template-columns: 1fr; }
            .hex { width: 55px; height: 63px; font-size: 1.3rem; }
            .hex-row:nth-child(even) { transform: translateX(29px); }
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="fixed inset-0 z-[6000] bg-[#0f172a] flex items-center justify-center p-6 text-center">
        <div class="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/10 w-full max-w-lg shadow-2xl">
            <h1 class="text-3xl font-black text-yellow-400 mb-6 italic">إعداد المواجهة</h1>
            <input type="text" id="game-title-input" placeholder="عنوان المسابقة" class="w-full p-4 mb-4 rounded-2xl bg-black/40 border border-white/10 text-white text-center text-xl outline-none focus:border-yellow-500">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <input type="text" id="team1-name-input" value="صقور الجو" class="p-3 rounded-xl bg-green-900/20 border border-green-500 text-white text-center font-bold">
                <input type="text" id="team2-name-input" value="نمور الأرض" class="p-3 rounded-xl bg-orange-900/20 border border-orange-500 text-white text-center font-bold">
            </div>
            <button onclick="startGame()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-2xl text-2xl transition transform hover:scale-105 shadow-xl">انطلاق المسابقة</button>
        </div>
    </div>

    <header class="p-4 flex justify-between items-center bg-black/30 backdrop-blur-md">
        <div id="round-label" class="bg-indigo-600 px-6 py-1 rounded-full font-bold shadow-lg">الجولة 1</div>
        <h1 id="main-title" class="text-xl font-black text-yellow-400 italic">حروف</h1>
        <button onclick="location.reload()" class="bg-white/10 px-4 py-1 rounded-lg text-sm border border-white/10 transition hover:bg-white/20">إعادة البدء</button>
    </header>

    <div class="game-container">
        <div id="hex-board" class="hex-table">
            </div>

        <div class="side-panel">
            <div class="score-box bg-green-600 shadow-lg">
                <h3 id="t1-name" class="font-bold italic">الأخضر</h3>
                <div id="score1" class="text-5xl font-black">0</div>
            </div>
            <div class="score-box bg-orange-600 shadow-lg">
                <h3 id="t2-name" class="font-bold italic">البرتقالي</h3>
                <div id="score2" class="text-5xl font-black">0</div>
            </div>
            <div class="flex-1 bg-black/40 rounded-3xl p-6 flex flex-col items-center justify-center border border-white/5 shadow-inner">
                <span class="text-xs opacity-50 mb-2 uppercase tracking-widest">الحرف المختار</span>
                <div id="current-letter" class="text-7xl font-black text-yellow-400 drop-shadow-xl">-</div>
            </div>
            <button onclick="renderGrid()" class="bg-indigo-500/20 hover:bg-indigo-500/40 p-3 rounded-xl font-bold transition">🎲 خلط الحروف</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <h1 id="win-msg-main" class="text-7xl font-black text-yellow-400 mb-4 drop-shadow-2xl"></h1>
        <h2 id="win-msg-sub" class="text-3xl font-bold text-white mb-8"></h2>
    </div>

    <audio id="final-win-audio" src="win.mp3"></audio>

    <script>
        const letters = "أبتثجحخدذرزسشصضطظعغفقلمنهوي".split("");
        let score1 = 0, score2 = 0, roundIdx = 1, isLocked = false, gridData = [];
        let team1Name = "", team2Name = "";

        function startGame() {
            team1Name = document.getElementById('team1-name-input').value || "الأخضر";
            team2Name = document.getElementById('team2-name-input').value || "البرتقالي";
            document.getElementById('main-title').innerText = document.getElementById('game-title-input').value || "حروف";
            document.getElementById('t1-name').innerText = team1Name;
            document.getElementById('t2-name').innerText = team2Name;
            document.getElementById('setup-screen').classList.add('hidden');
            
            renderGrid();
            // تأثير البداية (نفس تأثير الفوز)
            startConfetti(3000); 
        }

        function renderGrid() {
            const board = document.getElementById('hex-board');
            board.innerHTML = '';
            gridData = [];
            let pool = [...letters].sort(() => 0.5 - Math.random());

            // شبكة 8 أعمدة لضمان وجود 6 خلايا خضراء في الوسط
            for (let r = 0; r < 5; r++) {
                const row = document.createElement('div');
                row.className = 'hex-row';
                gridData[r] = [];
                for (let c = 0; c < 5; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hex';
                    
                    // توزيع الجدران: 6 فوق و 6 تحت (الأعمدة من 1 لـ 6)
                    const isTopRow = (r === 0 && c >= 1 && c <= 5);
                    const isBottomRow = (r === 6 && c >= 1 && c <= 5);
                    
                    // 5 خلايا يمين ويسار
                    const isLeftCol = (c === 0 && r >= 1 && r <= 5);
                    const isRightCol = (c === 7 && r >= 1 && r <= 5);
                    
                    const isCorner = (r === 0 || r === 6) && (c === 0 || c === 7);

                    if (isTopRow || isBottomRow) {
                        hex.classList.add('edge-green');
                    } else if (isLeftCol || isRightCol) {
                        hex.classList.add('edge-orange');
                    } else if (isCorner || (r===0 && c===7) || (r===6 && c===0)) {
                        hex.classList.add('empty');
                    } else {
                        // منطقة الحروف
                        hex.innerText = pool.pop() || "؟";
                        hex.dataset.state = "0";
                        hex.onclick = () => handleHexClick(hex, r, c);
                    }
                    
                    row.appendChild(hex);
                    gridData[r][c] = hex;
                }
                board.appendChild(row);
            }
        }

        function handleHexClick(hex, r, c) {
            if (isLocked) return;
            document.getElementById('current-letter').innerText = hex.innerText;
            let s = (parseInt(hex.dataset.state) + 1) % 4;
            hex.dataset.state = s;
            hex.className = 'hex';
            if (s === 1) hex.classList.add('active-yellow');
            if (s === 2) hex.classList.add('active-green');
            if (s === 3) hex.classList.add('active-orange');
            checkWinner();
        }

        function checkWinner() {
            if (hasPath(2, 'vertical')) announceWin(1);
            else if (hasPath(3, 'horizontal')) announceWin(2);
        }

        function hasPath(target, mode) {
            const visited = new Set();
            const stack = [];
            // التحقق من الأعمدة من 1 إلى 6 (المنطقة الخضراء)
            for (let i = 1; i <= 6; i++) {
                let r = (mode === 'vertical') ? 1 : i;
                let c = (mode === 'vertical') ? i : 1;
                if (gridData[r] && gridData[r][c] && parseInt(gridData[r][c].dataset.state) === target) stack.push([r, c]);
            }
            while (stack.length > 0) {
                const [r, c] = stack.pop();
                if (visited.has(`${r},${c}`)) continue;
                visited.add(`${r},${c}`);
                if ((mode === 'vertical' && r === 5) || (mode === 'horizontal' && c === 6)) return true;
                getNeighbors(r, c).forEach(([nr, nc]) => {
                    if (gridData[nr] && gridData[nr][nc] && parseInt(gridData[nr][nc].dataset.state) === target) stack.push([nr, nc]);
                });
            }
            return false;
        }

        function getNeighbors(r, c) {
            return (r % 2 === 0) ? 
                [[r-1, c], [r-1, c+1], [r, c-1], [r, c+1], [r+1, c], [r+1, c+1]] :
                [[r-1, c-1], [r-1, c], [r, c-1], [r, c+1], [r+1, c-1], [r+1, c]];
        }

        function announceWin(team) {
            isLocked = true;
            const winner = (team === 1) ? team1Name : team2Name;
            if (team === 1) score1++; else score2++;
            document.getElementById('score1').innerText = score1;
            document.getElementById('score2').innerText = score2;

            if (score1 === 2 || score2 === 2) {
                document.getElementById('final-win-audio').play();
                showOverlay("🏆 بطل المسابقة 🏆", winner, 11000);
                startConfetti(11000);
                setTimeout(() => location.reload(), 11500);
            } else {
                showOverlay(`الفائز بالجولة ${roundIdx}`, winner, 4000);
                setTimeout(() => { roundIdx++; document.getElementById('round-label').innerText = `الجولة ${roundIdx}`; isLocked = false; renderGrid(); }, 4000);
            }
        }

        function showOverlay(m, s, d) {
            const ov = document.getElementById('win-overlay');
            document.getElementById('win-msg-main').innerText = m;
            document.getElementById('win-msg-sub').innerText = s;
            ov.classList.add('show-overlay');
            setTimeout(() => ov.classList.remove('show-overlay'), d);
        }

        function startConfetti(ms) {
            const end = Date.now() + ms;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#facc15', '#22c55e', '#f97316'] });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#facc15', '#22c55e', '#f97316'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
