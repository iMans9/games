<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة حروف - النسخة الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* الخطأ الأول: إضافة الخلفية البنفسجية المتدرجة لكامل الصفحة */
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            min-height: 100vh; 
            color: white; 
            margin: 0; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .game-wrapper {
            display: grid; 
            grid-template-columns: 1fr 380px;
            gap: 20px; 
            padding: 20px; 
            max-width: 1500px; 
            margin: 0 auto; 
            flex-grow: 1;
            align-items: center;
        }

        /* حاوية لوحة الحروف */
        .board-section {
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
        }

        .hex-grid {
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .hex-row { display: flex; margin-bottom: -18px; }
        .hex-row:nth-child(even) { transform: translateX(41px); }

        .hexagon {
            width: 78px; 
            height: 90px; 
            background: white;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 2.2rem; 
            font-weight: 900;
            color: #4c1d95; 
            margin: 2px;
            user-select: none;
        }

        /* ألوان الحالات */
        .state-1 { background: #facc15 !important; color: black; box-shadow: 0 0 15px #facc15; }
        .state-2 { background: #22c55e !important; color: white; }
        .state-3 { background: #f97316 !important; color: white; }

        /* اللوحة الجانبية */
        .side-panel {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            border-radius: 30px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            height: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .result-card {
            border-radius: 15px; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            font-size: 1.1rem; 
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-action {
            width: 100%; padding: 12px; border-radius: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-action:hover { background: rgba(255,255,255,0.2); }

        .question-area {
            background: #ef4444; 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center;
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; padding: 20px;
        }

        input::placeholder { color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <div id="setup-screen" class="overlay">
        <div class="bg-white/10 backdrop-blur-2xl p-10 rounded-[2.5rem] border border-white/20 text-center w-full max-w-md shadow-2xl">
            <h1 class="text-3xl font-black text-yellow-400 mb-8 italic">إعداد المسابقة</h1>
            
            <div class="space-y-4 mb-8">
                <input type="text" id="game-title-input" placeholder="اسم المسابقة (مثلاً: حروف مع عز)" 
                    class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 text-white text-center text-lg outline-none focus:border-yellow-500">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="team1-name-input" value="فريق واحد" 
                        class="p-4 rounded-2xl bg-orange-500/20 border border-orange-500/50 text-white text-center font-bold outline-none focus:bg-orange-500/40">
                    <input type="text" id="team2-name-input" value="فريق اثنين" 
                        class="p-4 rounded-2xl bg-green-500/20 border border-green-500/50 text-white text-center font-bold outline-none focus:bg-green-500/40">
                </div>
            </div>

            <button onclick="startGame()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-5 rounded-2xl text-2xl transition transform hover:scale-105 shadow-xl">
                ابدأ التحدي
            </button>
        </div>
    </div>

    <header class="p-4 flex justify-between items-center bg-black/20 backdrop-blur-md">
        <h1 id="display-title" class="text-xl font-black text-yellow-400">حروف</h1>
        <div id="round-info" class="bg-white/10 px-4 py-1 rounded-full text-sm font-bold">الجولة الأولى</div>
    </header>

    <div class="game-wrapper">
        <div class="board-section">
            <div id="grid-container" class="hex-grid"></div>
        </div>

        <div class="side-panel">
            <div class="result-card bg-orange-600">
                <span id="display-team1">فريق واحد</span>
                <span id="score1" class="bg-black/20 px-3 py-1 rounded-lg">0 فوز</span>
            </div>
            
            <div class="result-card bg-green-600">
                <span id="display-team2">فريق اثنين</span>
                <span id="score2" class="bg-black/20 px-3 py-1 rounded-lg">0 فوز</span>
            </div>

            <div class="question-area">
                <div class="bg-white text-red-600 w-16 h-16 mx-auto rounded-2xl flex items-center justify-center text-3xl font-black mb-4 shadow-lg" id="active-letter">-</div>
                <p class="text-xl font-bold leading-relaxed">اضغط على أي حرف لبدء السؤال</p>
                <button class="mt-6 bg-white/20 hover:bg-white/30 py-3 rounded-full text-sm font-black transition">اضغط للإجابة</button>
            </div>

            <button onclick="shuffleBoard()" class="btn-action">🎲 توزيع عشوائي</button>
            <button onclick="clearBoard()" class="btn-action">🗑️ تفريغ اللوحة</button>
            <button onclick="location.reload()" class="btn-action text-red-300">⚙️ الإعدادات</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <h1 id="win-text" class="text-7xl font-black text-yellow-400 mb-4 text-center"></h1>
        <p id="win-subtext" class="text-3xl font-bold text-white"></p>
    </div>

    <audio id="win-sound" src="win.mp3"></audio>

    <script>
        const lettersList = "أبتثجحخدذرزسشصضطظعغفقلمنهوي".split("");
        let score1 = 0, score2 = 0, currentRound = 1, gameLocked = false;

        function startGame() {
            const title = document.getElementById('game-title-input').value || "حروف";
            const t1 = document.getElementById('team1-name-input').value || "فريق واحد";
            const t2 = document.getElementById('team2-name-input').value || "فريق اثنين";

            document.getElementById('display-title').innerText = title;
            document.getElementById('display-team1').innerText = t1;
            document.getElementById('display-team2').innerText = t2;
            
            document.getElementById('setup-screen').style.display = 'none';
            initGrid();
        }

        function initGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            let shuffled = [...lettersList].sort(() => 0.5 - Math.random());
            
            for (let r = 0; r < 5; r++) {
                const row = document.createElement('div');
                row.className = 'hex-row';
                for (let c = 0; c < 5; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hexagon';
                    hex.innerText = shuffled.pop() || "؟";
                    hex.dataset.state = "0";
                    hex.onclick = () => {
                        if(gameLocked) return;
                        document.getElementById('active-letter').innerText = hex.innerText;
                        let nextState = (parseInt(hex.dataset.state) + 1) % 4;
                        hex.dataset.state = nextState;
                        hex.className = `hexagon state-${nextState}`;
                        // ملاحظة: يمكنك إضافة منطق الفوز التلقائي هنا
                    };
                    row.appendChild(hex);
                }
                container.appendChild(row);
            }
        }

        function shuffleBoard() { if(!gameLocked) initGrid(); }
        
        function clearBoard() {
            document.querySelectorAll('.hexagon').forEach(h => {
                h.className = 'hexagon';
                h.dataset.state = "0";
            });
            document.getElementById('active-letter').innerText = "-";
        }

        // دالة تجريبية للفوز (يمكنك استدعاؤها برمجياً أو ربطها بزر)
        function triggerWin(team) {
            gameLocked = true;
            const winnerName = team === 1 ? document.getElementById('display-team1').innerText : document.getElementById('display-team2').innerText;
            if(team === 1) score1++; else score2++;
            
            document.getElementById('score1').innerText = `${score1} فوز`;
            document.getElementById('score2').innerText = `${score2} فوز`;

            const overlay = document.getElementById('win-overlay');
            const winText = document.getElementById('win-text');
            overlay.classList.remove('hidden');

            if(score1 === 2 || score2 === 2) {
                winText.innerText = `🏆 بطل المسابقة: ${winnerName} 🏆`;
                document.getElementById('win-sound').play();
                celebrate(11000);
                setTimeout(() => location.reload(), 11500);
            } else {
                winText.innerText = `الفائز بالجولة: ${winnerName}`;
                setTimeout(() => {
                    currentRound++;
                    document.getElementById('round-info').innerText = `الجولة ${currentRound === 2 ? 'الثانية' : 'الثالثة'}`;
                    overlay.classList.add('hidden');
                    gameLocked = false;
                    initGrid();
                }, 4000);
            }
        }

        function celebrate(ms) {
            const end = Date.now() + ms;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
