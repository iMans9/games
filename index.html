<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة حروف - التصميم الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@700&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hex-default: #FDFFCD;
            --hex-green: #38a169;
            --hex-orange: #f97316;
            --hex-yellow: #facc15;
            --dark-bg: #1a1a1a;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); 
            min-height: 100vh; color: white; margin: 0; overflow-x: hidden;
        }

        .game-container {
            display: grid; grid-template-columns: 1fr 340px;
            gap: 30px; padding: 20px; max-width: 1400px; margin: 0 auto;
        }

        /* حاوية اللوحة - محاكاة huroof.app */
        .hex-table {
            background-color: rgba(0,0,0,0.3);
            padding: 50px 20px; border-radius: 2rem;
            display: flex; flex-direction: column; align-items: center;
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hex-row {
            display: flex;
            justify-content: center;
            margin-top: -14px; /* تداخل الصفوف لخلق شكل خلية النحل */
        }

        .hex {
            position: relative;
            width: 80px; height: 92px;
            background-color: var(--hex-default);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-top: 2px;
            margin-right: 2px;
            margin-bottom: 2px;
            margin-left: 2px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'El Messiri', sans-serif;
            font-size: 2.2rem; font-weight: bold; color: #2d3748;
            cursor: pointer; transition: all 0.3s ease;
            user-select: none;
        }

        /* إزاحة الصفوف الزوجية */
        .hex-row:nth-child(even) { transform: translateX(42px); }

        /* الألوان عند الاختيار */
        .hex.active-yellow { background-color: var(--hex-yellow); color: #000; box-shadow: 0 0 20px var(--hex-yellow); }
        .hex.active-green { background-color: var(--hex-green); color: #fff; }
        .hex.active-orange { background-color: var(--hex-orange); color: #fff; }

        /* الجدران الجانبية (الأطراف) */
        .hex.edge-green { background-color: #0aad56; color: transparent; cursor: default; opacity: 0.9; }
        .hex.edge-orange { background-color: #ff4400; color: transparent; cursor: default; opacity: 0.9; }

        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .score-box { 
            padding: 20px; border-radius: 1.5rem; text-align: center;
            border-bottom: 6px solid rgba(0,0,0,0.3);
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; text-align: center;
        }
        .show-overlay { display: flex; animation: zoomIn 0.5s; }

        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 1024px) {
            .game-container { grid-template-columns: 1fr; }
            .hex { width: 60px; height: 69px; font-size: 1.5rem; }
            .hex-row:nth-child(even) { transform: translateX(31px); }
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="fixed inset-0 z-[6000] bg-[#0f172a] flex items-center justify-center p-6">
        <div class="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/10 text-center w-full max-w-lg shadow-2xl">
            <h1 class="text-4xl font-black text-yellow-400 mb-8 italic">إعداد المواجهة</h1>
            <input type="text" id="game-title-input" placeholder="عنوان المسابقة" class="w-full p-4 mb-6 rounded-2xl bg-black/40 border border-white/10 text-white text-center text-xl outline-none focus:border-yellow-500 transition">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div>
                    <label class="block text-green-400 mb-2 font-bold">فريق الأخضر</label>
                    <input type="text" id="team1-name-input" value="صقور الجو" class="w-full p-3 rounded-xl bg-green-900/20 border border-green-500/50 text-white text-center font-bold">
                </div>
                <div>
                    <label class="block text-orange-400 mb-2 font-bold">فريق البرتقالي</label>
                    <input type="text" id="team2-name-input" value="نمور الأرض" class="w-full p-3 rounded-xl bg-orange-900/20 border border-orange-500/50 text-white text-center font-bold">
                </div>
            </div>
            <button onclick="startGame()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-5 rounded-2xl text-2xl transition transform hover:scale-105 shadow-xl">انطلاق المسابقة</button>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center bg-black/30 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div id="round-label" class="bg-indigo-600 px-6 py-2 rounded-full font-black text-lg shadow-lg">الجولة 1</div>
            <h1 id="main-title" class="text-2xl font-black text-yellow-400 tracking-wider">حروف</h1>
        </div>
        <button onclick="location.reload()" class="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-xl font-bold border border-white/10 transition">إعادة البدء</button>
    </header>

    <div class="game-container">
        <div id="hex-board" class="hex-table">
            </div>

        <div class="side-panel">
            <div class="score-box bg-green-600">
                <h3 id="t1-name" class="text-lg font-bold mb-1 italic">الفريق الأخضر</h3>
                <div id="score1" class="text-6xl font-black">0</div>
            </div>
            
            <div class="score-box bg-orange-600">
                <h3 id="t2-name" class="text-lg font-bold mb-1 italic">الفريق البرتقالي</h3>
                <div id="score2" class="text-6xl font-black">0</div>
            </div>

            <div class="flex-1 bg-black/40 rounded-3xl p-8 flex flex-col items-center justify-center border border-white/5 shadow-inner">
                <span class="text-sm opacity-50 mb-4 uppercase tracking-widest">الحرف المختار</span>
                <div id="current-letter" class="text-8xl font-black text-yellow-400 drop-shadow-2xl">-</div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="renderGrid()" class="bg-indigo-500/20 hover:bg-indigo-500/40 p-4 rounded-2xl font-bold transition">🎲 خلط</button>
                <button onclick="clearBoard()" class="bg-red-500/10 hover:bg-red-500/30 p-4 rounded-2xl font-bold text-red-400 transition">🗑️ مسح</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <h1 id="win-msg-main" class="text-8xl font-black text-yellow-400 mb-6 drop-shadow-2xl"></h1>
        <h2 id="win-msg-sub" class="text-4xl font-bold text-white mb-10"></h2>
        <div class="w-24 h-1 bg-yellow-500 rounded-full animate-pulse"></div>
    </div>

    <audio id="final-win-audio" src="win.mp3"></audio>

    <script>
        const allLetters = "أبتثجحخدذرزسشصضطظعغفقلمنهوي".split("");
        let score1 = 0, score2 = 0, roundIdx = 1, isLocked = false, gridData = [];
        let team1Name = "", team2Name = "";

        function startGame() {
            team1Name = document.getElementById('team1-name-input').value || "الأخضر";
            team2Name = document.getElementById('team2-name-input').value || "البرتقالي";
            document.getElementById('main-title').innerText = document.getElementById('game-title-input').value || "حروف";
            document.getElementById('t1-name').innerText = team1Name;
            document.getElementById('t2-name').innerText = team2Name;
            document.getElementById('setup-screen').classList.add('hidden');
            renderGrid();
        }

        function renderGrid() {
            const board = document.getElementById('hex-board');
            board.innerHTML = '';
            gridData = [];
            let letterPool = [...allLetters].sort(() => 0.5 - Math.random());

            for (let r = 0; r < 7; r++) {
                const row = document.createElement('div');
                row.className = 'hex-row';
                gridData[r] = [];
                for (let c = 0; c < 7; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hex';
                    
                    const isTopBottom = (r === 0 || r === 6);
                    const isLeftRight = (c === 0 || c === 6);

                    if (isTopBottom) {
                        hex.classList.add('edge-green');
                    } else if (isLeftRight) {
                        hex.classList.add('edge-orange');
                    } else {
                        hex.innerText = letterPool.pop() || "؟";
                        hex.dataset.state = "0";
                        hex.onclick = () => handleHexClick(hex, r, c);
                    }
                    
                    row.appendChild(hex);
                    gridData[r][c] = hex;
                }
                board.appendChild(row);
            }
        }

        function handleHexClick(hex, r, c) {
            if (isLocked) return;
            document.getElementById('current-letter').innerText = hex.innerText;
            let s = (parseInt(hex.dataset.state) + 1) % 4;
            hex.dataset.state = s;
            hex.className = 'hex';
            if (s === 1) hex.classList.add('active-yellow');
            if (s === 2) hex.classList.add('active-green');
            if (s === 3) hex.classList.add('active-orange');
            checkWinner();
        }

        function checkWinner() {
            if (hasPath(2, 'vertical')) announceRoundWin(1);
            else if (hasPath(3, 'horizontal')) announceRoundWin(2);
        }

        function hasPath(target, mode) {
            const visited = new Set();
            const stack = [];
            for (let i = 1; i <= 5; i++) {
                let r = (mode === 'vertical') ? 1 : i;
                let c = (mode === 'vertical') ? i : 1;
                if (parseInt(gridData[r][c].dataset.state) === target) stack.push([r, c]);
            }
            while (stack.length > 0) {
                const [r, c] = stack.pop();
                const key = `${r},${c}`;
                if (visited.has(key)) continue;
                visited.add(key);
                if ((mode === 'vertical' && r === 5) || (mode === 'horizontal' && c === 5)) return true;
                getNeighbors(r, c).forEach(([nr, nc]) => {
                    if (nr >= 1 && nr <= 5 && nc >= 1 && nc <= 5) {
                        if (parseInt(gridData[nr][nc].dataset.state) === target) stack.push([nr, nc]);
                    }
                });
            }
            return false;
        }

        function getNeighbors(r, c) {
            // منطق الجوار الدقيق للشبكة السداسية المعتمدة على إزاحة الصفوف الزوجية
            return (r % 2 === 0) ? 
                [[r-1, c], [r-1, c+1], [r, c-1], [r, c+1], [r+1, c], [r+1, c+1]] :
                [[r-1, c-1], [r-1, c], [r, c-1], [r, c+1], [r+1, c-1], [r+1, c]];
        }

        function announceRoundWin(team) {
            isLocked = true;
            const winner = (team === 1) ? team1Name : team2Name;
            if (team === 1) score1++; else score2++;

            document.getElementById('score1').innerText = score1;
            document.getElementById('score2').innerText = score2;

            if (score1 === 2 || score2 === 2) {
                document.getElementById('final-win-audio').play();
                showOverlay("🏆 بطل المسابقة 🏆", winner, 11000);
                startConfetti(11000);
                setTimeout(() => location.reload(), 11500);
            } else {
                showOverlay(`الفائز بالجولة ${roundIdx}`, winner, 4000);
                setTimeout(() => {
                    roundIdx++;
                    document.getElementById('round-label').innerText = `الجولة ${roundIdx}`;
                    isLocked = false;
                    renderGrid();
                }, 4000);
            }
        }

        function showOverlay(m, s, d) {
            const ov = document.getElementById('win-overlay');
            document.getElementById('win-msg-main').innerText = m;
            document.getElementById('win-msg-sub').innerText = s;
            ov.classList.add('show-overlay');
            setTimeout(() => ov.classList.remove('show-overlay'), d);
        }

        function startConfetti(ms) {
            const end = Date.now() + ms;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function clearBoard() {
            document.querySelectorAll('.hex:not(.edge-green):not(.edge-orange)').forEach(h => {
                h.className = 'hex';
                h.dataset.state = "0";
            });
        }
    </script>
</body>
</html>
