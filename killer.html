<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من القاتل لعيون أحمد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #eccc68;
            --dark-bg: #0a0a0b;
            --card-bg: #1e1e26;
            --success: #2ed573;
            --error: #ff6b81;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #333;
            text-align: center;
            z-index: 10;
        }

        h1 { font-size: 2.2em; color: var(--secondary); margin-bottom: 20px; text-shadow: 0 5px 15px rgba(236, 204, 104, 0.2); }

        .setup, .game-area, .win-screen { display: none; }
        .active { display: block; }

        input {
            padding: 15px; border-radius: 15px; border: 2px solid #333;
            background: #121212; color: white; width: 80%; margin-bottom: 15px;
            font-size: 1.1em; text-align: center;
        }

        button {
            padding: 15px 25px; cursor: pointer; background: var(--primary);
            color: white; border: none; border-radius: 15px; font-weight: bold;
            transition: 0.2s; box-shadow: 0 4px 0 #b33939;
        }
        button:active { transform: translateY(3px); box-shadow: 0 0px 0 #b33939; }

        .score-board { display: flex; gap: 15px; margin-bottom: 20px; }
        .team-box { flex: 1; padding: 15px; border-radius: 20px; background: #25252d; border: 3px solid transparent; transition: 0.4s; }
        .team-box.active-turn { border-color: var(--secondary); background: #2d2d3a; transform: scale(1.02); }
        .points { font-size: 2.2em; display: block; color: var(--secondary); font-weight: 900; }

        .turn-tag { background: var(--secondary); color: #000; padding: 5px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; display: inline-block; }

        .level-btn { width: 100%; margin: 8px 0; }
        .lvl-10 { background: #1e90ff; box-shadow: 0 4px 0 #0972d4; }
        .lvl-20 { background: #ffa502; box-shadow: 0 4px 0 #cc8400; }
        .lvl-30 { background: #8258fa; box-shadow: 0 4px 0 #5f3dc4; }

        .story-box { background: #fff; color: #2c3e50; padding: 25px; border-radius: 25px; text-align: right; margin: 20px 0; line-height: 1.7; font-size: 1.15em; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #34495e; box-shadow: 0 4px 0 #2c3e50; }

        .hint-text { background: #fff9db; color: #856404; padding: 12px; margin: 10px 0; border-radius: 12px; display: none; border-right: 5px solid #fab005; font-weight: bold; }
        .explanation { margin-top: 15px; padding: 15px; border-radius: 15px; display: none; font-weight: bold; }

        /* شاشة الفوز */
        .win-screen h2 { font-size: 3em; color: var(--secondary); margin-bottom: 10px; }
        .win-screen p { font-size: 1.5em; color: #fff; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <h1>🕵️‍♂️ من القاتل لعيون أحمد 🕵️‍♀️</h1>

    <div id="setup" class="setup active">
        <input type="text" id="t1" placeholder="اسم الفريق الأول">
        <input type="text" id="t2" placeholder="اسم الفريق الثاني">
        <br><button onclick="startGame()">ابدأ التحدي (هدف 100ن) 🔍</button>
    </div>

    <div id="gameArea" class="game-area">
        <div id="turnTag" class="turn-tag">دور فريق: -</div>
        <div class="score-board">
            <div id="box1" class="team-box active-turn">
                <span id="nameT1">فريق 1</span>
                <span class="points" id="s1">0</span>
            </div>
            <div id="box2" class="team-box">
                <span id="nameT2">فريق 2</span>
                <span class="points" id="s2">0</span>
            </div>
        </div>

        <div id="levels" class="animate__animated animate__fadeInUp">
            <h3>اختر مستوى القضية:</h3>
            <button class="level-btn lvl-10" onclick="loadStory(10)">جُنحة (10 ن)</button>
            <button class="level-btn lvl-20" onclick="loadStory(20)">جريمة غامضة (20 ن)</button>
            <button class="level-btn lvl-30" onclick="loadStory(30)">قضية محنكة (30 ن)</button>
        </div>

        <div id="storyDisplay" style="display:none;">
            <div class="story-box animate__animated animate__zoomIn">
                <div id="storyText"></div>
                <div id="hintArea" class="hint-text"></div>
                <div id="options" class="options-grid"></div>
            </div>
            <button id="hintBtn" style="background:#f39c12; box-shadow: 0 4px 0 #d35400;" onclick="useHint()">💡 طلب تلميح</button>
            <div id="explanation" class="explanation"></div>
            <br><button id="nextBtn" style="display:none; width:100%" onclick="resetTurn()">القضية التالية ⬅️</button>
        </div>
    </div>

    <div id="winScreen" class="win-screen animate__animated animate__bounceIn">
        <h2>مبروك لـ <span id="winnerName"></span>! 🎉</h2>
        <p>يا أطلق محققين في العالم 🕵️‍♂️🔥</p>
        <br><button onclick="location.reload()">لعب مرة أخرى</button>
    </div>
</div>

<script>
    const allStories = {
    10: [
    { q: "رجل مقتول في غرفته يوم الأحد. الخادم قال كان يجمع البريد، الزوجة قالت كانت نائمة، الطباخ قال يجهز غداء الإثنين. من القاتل؟", options: ["الخادم", "الزوجة", "الطباخ"], ans: 0, hint: "هل يوجد توزيع بريد يوم الأحد؟", why: "الخادم؛ لأنه لا يوجد توزيع بريد رسمي في أيام الآحاد." },
    { q: "وُجدت جثة في غابة مطيرة. المشتبه به قال إنه كان يشعل ناراً بحطب جاف وجده بالأرض. لماذا قبضوا عليه؟", options: ["لأن النار ممنوعة", "الغابة المطيرة حطبها دائماً مبلل والرطوبة تمنع وجود خشب جاف تماماً", "لأنه لا يملك ولاعة"], ans: 1, hint: "فكر في طبيعة الغابة 'المطيرة'.", why: "في الغابات المطيرة الرطوبة عالية جداً ومن المستحيل العثور على حطب جاف بالأرض." },
    { q: "مات شخص في مكتبه والكهرباء مقطوعة. ادعى السكرتير أنه كان يصور أوراقاً هامة لحظة الوفاة. لماذا هو كاذب؟", options: ["لأن الأوراق سرية", "آلة التصوير لا تعمل بدون كهرباء", "لأن المكتب مظلم"], ans: 1, hint: "الكهرباء مقطوعة..", why: "ادعى استخدام آلة التصوير والكهرباء مقطوعة، وهذا مستحيل تقنياً." },
    { q: "وُجد غريق في مسبح عمقه 50 سم. المشتبه به قال إن الضحية سقط وغرق وهو بكامل وعيه. لماذا شك المحقق؟", options: ["المسبح صغير", "الإنسان الطبيعي الواعي لا يغرق في ماء يصل لركبته فقط", "الماء كان بارداً"], ans: 1, hint: "50 سم تعادل ركبة الرجل.", why: "الغرق في هذا العمق يتطلب فقدان وعي أو تدخلاً خارجياً لمنع الشخص من الوقوف." },
    { q: "ادعى مشتبه به أنه رأى وجه القاتل بوضوح لأن الشمس كانت ساطعة خلف ظهر القاتل تماماً. لماذا هو كاذب؟", options: ["لأن الشمس قوية", "الضوء خلف الشخص يحول وجهه لظل أسود (سيلويت) ويخفي الملامح", "لأن القاتل سريع"], ans: 1, hint: "جرب قف أمام كشاف ضوء قوي.. هل يرى الناس وجهك؟", why: "فيزيائياً، الضوء القوي من الخلف يجعل الوجه مظلماً تماماً للمشاهد." },
    { q: "رجل مقتول بطلقة من الخلف. رفيقه قال إنه انتحر بيده اليمنى. لماذا تم القبض عليه؟", options: ["السلاح مفقود", "مستحيل انتحار شخص بطلقة في منتصف ظهره", "الرفيق كان يرتجف"], ans: 1, hint: "جرب وضع يدك في منتصف ظهرك..", why: "زاوية الإطلاق من الخلف تجعل فرضية الانتحار مستحيلة منطقياً وعضلياً." },
    { q: "سيدة مقتولة في المطبخ. الجار قال إنه سمع صراخها ودخل فوراً، لكن الباب كان مقفلاً بالمفتاح من الداخل. كيف كشفه المحقق؟", options: ["رآها من النافذة", "سمع الصوت فقط", "الجار هو القاتل ودخل بمفتاح احتياطي (تناقض قوله دخلت فوراً والباب مقفل)", "الخادمة ساعدته"], ans: 2, hint: "كيف دخل والباب مقفل؟", why: "ادعاؤه بالدخول 'فوراً' والباب مقفل تناقض يثبت وجوده بالداخل مسبقاً." },
    { q: "رجل مقتول في الصحراء والمحرك 'بارد' جداً. رفيقه قال إن السيارة تعطلت 'منذ دقيقة'. لماذا كُشف؟", options: ["لأن الوقود ممتلئ", "المحرك يحتاج وقت طويل ليبرد في حرارة الصحراء", "لأن السيارة جديدة"], ans: 1, hint: "المحرك يبرد ببطء.", why: "برودة المحرك تماماً تعني أن السيارة متوقفة منذ ساعات وليس دقيقة واحدة." },
    { q: "ادعى مشتبه به أنه كان يراقب 'القمر بدراً' في ليلة 3 من الشهر الهجري. لماذا هو كاذب؟", options: ["لأن الجو غائم", "القمر يكون هلالاً في بداية الشهر وليس بدراً", "لأن القمر لا يظهر"], ans: 1, hint: "متى يكتمل القمر؟", why: "القمر يكتمل (بدراً) في منتصف الشهر العربي (14-15) فقط." },
    { q: "مات شخص مسموماً. الضيف قال شربنا من نفس الإبريق، لكن الضحية مات والضيف سليم. الإبريق كان به ثلج. كيف مات الضحية؟", options: ["السم في الإبريق", "السم كان في مكعبات الثلج (التي ذابت لاحقاً)", "السم في الكأس"], ans: 1, hint: "الضيف شرب فوراً والضحية انتظر قليلاً.", why: "السم كان في الثلج؛ الضيف شرب قبل ذوبانه، بينما شرب الضحية بعد ذوبان السم في العصير." },
    { q: "وُجدت جثة وعليها آثار حرق شمس شديدة. المشتبه به قال إن الضحية كان محبوساً في 'القبو المظلم' طوال الأسبوع. لماذا كُشف؟", options: ["القبو بارد", "حرق الشمس يتطلب التعرض للأشعة مباشرة ولا يحدث في القبو", "الضحية بشرته بيضاء"], ans: 1, hint: "أين تظهر حروق الشمس؟", why: "وجود حروق شمس على ضحية يُدعى حبسها في قبو مظلم كذبة طبية واضحة." },
    { q: "ادعى شخص أن لصاً كسر زجاج نافذة المتجر من 'الخارج'. المحقق وجد الزجاج كله متناثراً 'خارج' المتجر على الرصيف. لماذا اتهمه؟", options: ["الزجاج حاد", "الكسر من الخارج يدفع الزجاج للداخل؛ وجوده بالخارج يعني الكسر من الداخل", "لأن اللص هرب"], ans: 1, hint: "قوة الدفع والزجاج.", why: "فيزيائياً، يتناثر الزجاج في عكس اتجاه الضربة؛ وجوده بالخارج يعني أن الضربة جاءت من الداخل." },
    { q: "رجل مقتول في شقته بالدور الـ 50. المشتبه به قال إنه قفز من النافذة وهرب مشياً. لماذا هو كاذب؟", options: ["لأن السقوط من الـ 50 يقتل حتماً", "لأنه لا يملك حذاء", "المصعد معطل"], ans: 0, hint: "الجاذبية والارتفاع.", why: "السقوط من الطابق الـ 50 يؤدي للوفاة فوراً، والهروب مشياً مستحيل." },
    { q: "وُجدت جثة في حمام بخار (ساونا). المشتبه به قال إنه كان يستحم بماء ساخن والمرات كانت 'جافة' وواضحة. لماذا هو كاذب؟", options: ["الماء انقطع", "البخار والحرارة تسبب تكثفاً وضباباً على المرايا حتماً", "المرآة نظيفة"], ans: 1, hint: "ماذا يحدث للمرآة عند وجود بخار؟", why: "بخار الماء الساخن يغطي الأسطح الباردة كالمرايا بطبقة ضبابية فوراً." },
    { q: "مات رجل بجرعة سم. المشتبه به قال تذوقت الطعام معه ولم أمت. السم كان 'سريع المفعول'. لماذا هو القاتل؟", options: ["لديه مناعة", "لو تذوقه لمات فوراً لأن السم سريع المفعول", "الطعام لذيذ"], ans: 1, hint: "سم سريع المفعول.", why: "ادعاء تذوق سم سريع المفعول والبقاء حياً هو تناقض علمي." },
    { q: "ادعى رجل أن لصاً سرق حقيبته في زقاق 'مظلم تماماً' ووصف لون عيون اللص 'الأخضر' بدقة. لماذا كُشف؟", options: ["اللص يرتدي نظارة", "لا يمكن تمييز ألوان العيون في الظلام الدامس", "لأن اللص كان سريعاً"], ans: 1, hint: "الألوان والضوء.", why: "العين البشرية لا تميز الألوان الدقيقة في غياب الضوء التام." },
    { q: "رجل مقتول في غابة. المشتبه به قال إنه كان يصطاد طيوراً بالليل باستخدام 'صقر' الصيد. لماذا هو كاذب؟", options: ["الصقور لا تصطاد ليلاً (عمى ليلي)", "الطيور نائمة", "لأن الغابة مخيفة"], ans: 0, hint: "متى يصطاد الصقر؟", why: "الصقر طائر نهاري، ولا يملك رؤية ليلية تمكنه من الصيد في الظلام." },
    { q: "وُجدت جثة في حقل قمح. المشتبه به قال إنه كان يحصد القمح في شهر 'يناير'. لماذا قبضوا عليه؟", options: ["المحراث بطيء", "موسم حصاد القمح ليس في يناير (عز الشتاء)", "القمح لم ينمو"], ans: 1, hint: "متى يحصد المزارعون؟", why: "القضايا المنطقية تعتمد على المواسم؛ يناير شهر نمو وليس حصاد للقمح." },
    { q: "ادعى شاهد أنه سمع الضحية يهمس باسم القاتل من خلف جدار 'عازل للصوت' تماماً. لماذا هو كاذب؟", options: ["الضحية مات فوراً", "الجدار العازل يمنع انتقال الأصوات الضعيفة كالهمس", "الشاهد أصم"], ans: 1, hint: "وظيفة العزل.", why: "الجدران العازلة تمنع مرور الترددات الضعيفة، والهمس لا يخترقها." },
    { q: "رجل مقتول بآلة حادة. المشتبه به قال كان يعمل بمنشار كهربائي صوته عالٍ ولم يسمع شيئاً. المنشار كان 'بارداً' والكهرباء مقطوعة. لماذا اتهم؟", options: ["لأنه كاذب", "المنشار لا يعمل بدون كهرباء وبرودته تعني عدم استخدامه", "لأن المنشار حاد"], ans: 1, hint: "المحرك والكهرباء.", why: "استخدام حجة المنشار الكهربائي والكهرباء مقطوعة يثبت الكذب." },
    { q: "وُجدت جثة في يوم صيفي حار جداً. المشتبه به كان يرتدي 'معطف صوف' ثقيلاً. لماذا شك المحقق؟", options: ["لأنه سارق", "المعطف قد يستخدم لإخفاء دماء أو سلاح الجريمة تحت الملابس", "لأن الصوف غالي"], ans: 1, hint: "لماذا يلبس صوفاً في الحر؟", why: "ارتداء ملابس لا تناسب الطقس يثير الريبة حول محاولة إخفاء آثار الجريمة." },
    { q: "ادعى شخص أن لصاً دخل من النافذة. النافذة عليها 'خيوط عنكبوت' سليمة لم تتقطع. لماذا هو القاتل؟", options: ["العنكبوت سام", "الدخول من النافذة سيمزق خيوط العنكبوت حتماً", "النافذة صغيرة"], ans: 1, hint: "خيوط العنكبوت حساسة.", why: "بقاء الخيوط سليمة دليل قاطع على أن أحداً لم يمر عبر هذه النافذة." },
    { q: "مات شخص في بيته. المشتبه به قال إنه كان يغلي 'حليباً' وفار منه الحليب. البوتاجاز كان 'نظيفاً ولامعاً'. لماذا قبضوا عليه؟", options: ["الحليب لذيذ", "فوران الحليب يترك أثراً محترقاً وتنظيفه يستغرق وقتاً", "الحليب بارد"], ans: 1, hint: "أثر فوران الحليب.", why: "ادعاء فوران الحليب مع نظافة الجهاز تماماً يثبت اختلاق العذر." },
    { q: "وُجدت جثة في الصحراء وبجانبها سيارة إطاراتها 'ساخنة' جداً. المشتبه به قال السيارة متوقفة منذ 'يومين'. لماذا هو كاذب؟", options: ["الإطارات تبرد بسرعة", "سخونة الإطارات تعني أن السيارة كانت تتحرك قبل دقائق فقط", "السيارة بيضاء"], ans: 1, hint: "متى تسخن الإطارات؟", why: "الاحتكاك يولد حرارة؛ بقاء الحرارة يثبت أن السيارة كانت في حالة حركة حديثة." },

    { q: "وُجدت جثة في قبو منزل مهجور. ادعى المشتبه به أنه أنار المكان بـ 'ولاعة' ليرى الجثة. القبو كان مليئاً بغاز الميثان (غاز قابل للانفجار). لماذا هو القاتل؟", options: ["لأن الولاعة لا تعمل في القبو", "لو أشعل ولاعة في غاز الميثان لانفجر القبو فوراً؛ ادعاؤه يثبت أنه كان يعرف مكان الجثة مسبقاً", "لأن القبو ليس فيه غاز"], ans: 1, hint: "نار + غاز قابل للاشتعال = ؟", why: "إشعال نار في بيئة غازية يعني كارثة؛ عدم حدوث انفجار يعني أنه لم يشعل شيئاً وكذب في روايته." },

    { q: "سُرقت مجوهرات من قصر. الحارس قال إنه رأى السارق يهرب من بعيد وكان يرتدي قميصاً أحمر في ليلة 'خسوف قمر كلي'. لماذا قبضوا عليه؟", options: ["لأن القميص لا يلمع", "في الخسوف الكلي يسود ظلام دامس يمنع تمييز الألوان من مسافات بعيدة", "لأن السارق كان سريعاً"], ans: 1, hint: "الخسوف الكلي يعني انعدام الضوء المنعكس.", why: "الرؤية في الظلام الشديد تحول الألوان إلى درجات رمادية؛ تحديد اللون 'الأحمر' كذبة لتأكيد الرؤية." },
    { q: "وُجدت جثة في الصحراء وبجانبه عود ثقاب واحد غير محترق. لماذا استنتج المحقق أن الضحية قُتل (ضحية قرعة) ولم يمت من العطش؟", options: ["لأن الثقاب للتدخين", "استخدام عود ثقاب واحد سليم وسط الصحراء يشير لقرعة بين أشخاص للتخلص من واحد (لسحب العود القصير)", "لأن القاتل نسيه"], ans: 1, hint: "فكر في قصص المنطاد وسحب الأعواد.", why: "الأعواد السليمة في ظروف قاسية تشير لعملية اختيار عشوائية (قرعة الموت) للتخلص من حمولة زائدة." },

    { q: "مات شخص في بيته. المشتبه به قال إنه كان في الخارج طوال اليوم وجاء للتو، لكن 'فرن الغاز' في البيت كان دافئاً. لماذا شك المحقق؟", options: ["لأن الفرن قد ينفجر", "دفء الفرن يعني أن أحداً كان يطبخ قبل قليل، مما ينفي وجوده في الخارج طوال اليوم", "لأن الفرن يعمل بالكهرباء"], ans: 1, hint: "من الذي استخدم المطبخ قبل قليل؟", why: "بقاء الحرارة في الفرن دليل على نشاط بشري حديث في المنزل قبل دقائق فقط من وصول المحقق." },
    { q: "وُجد غريق في بركة سباحة بالمنزل. ادعى الصديق أنه حاول إنقاذه فوراً وعمل له تنفس صناعي، لكن ملابس الصديق كانت 'جافة'. من القاتل؟", options: ["الصديق", "الغريق انتحر", "عامل المسبح"], ans: 0, hint: "كيف تنقذ غريقاً من وسط الماء وتبقى جافاً؟", why: "الإنقاذ من الغرق يتطلب القفز في الماء أو ملامسته بشدة؛ جفاف الملابس يثبت أن الصديق لم يتحرك للمساعدة." },
    { q: "ادعى رجل أن لصاً قفز من فوق سور القصر (ارتفاع 5 أمتار) وهبط على الرمل دون أن يترك أثراً لعمق القدم. لماذا هو كاذب؟", options: ["لأن السور عالٍ جداً", "الجاذبية ستجعل القفزة تترك أثراً غائراً في الرمل حتماً؛ استواء الرمل يعني تزييف القصة", "لأن الرمل صلب"], ans: 1, hint: "تأثير السقوط من مكان مرتفع على السطح الرملي.", why: "الفيزياء تقول إن الارتفاع يولد طاقة اصطدام؛ عدم وجود حفرة في الرمل يعني أن أحداً لم يقفز." },

    { q: "وُجدت جثة في حفرة ثلجية. المشتبه به قال إن الضحية سقط ومات من البرد 'منذ أسبوع'. الجثة كانت غير متصلبة تماماً. لماذا شك المحقق؟", options: ["لأن الثلج يذوب", "البرد الشديد يؤخر التحلل لكنه يسرع التصلب؛ عدم التصلب يعني أن الوفاة حديثة جداً", "لأن الجثة دافئة"], ans: 1, hint: "تأثير الحرارة المنخفضة على عضلات الجثة.", why: "البرودة تجعل عضلات الجثة تتصلب بسرعة؛ ليونة الجسم تثبت كذب المشتبه به في توقيت الوفاة." },
    { q: "ادعى مشتبه به أنه رأى القاتل يهرب في المرآة 'المحدبة' للسيارة وبدا القاتل 'أكبر' من حجمه الطبيعي. لماذا هو كاذب؟", options: ["المرآة متسخة", "المرايا المحدبة (الجانبية) تصغر الأجسام ولا تكبرها حتماً", "لأن القاتل كان قريباً"], ans: 1, hint: "خصائص المرايا الجانبية للسيارات.", why: "فيزياء البصريات؛ المرايا الجانبية تصغر الصورة لتعطي مجال رؤية أوسع، ادعاء التكبير كذب." },

   30: [ // مستوى 30 نقطة - قضية محنكة (50 سؤال من العيار الثقيل)

    { q: "مات رجل بطلقة قناص خلف مكتبه. النافذة خلفه مكسورة، لكن ثقب الرصاص في الجدار كان 'أعلى' من مستوى رأس الضحية. لماذا اتهم السكرتير الذي كان أمامه؟", options: ["لأن السكرتير معه مسدس", "لو جاءت الطلقة من القناص بالخلف (بالأعلى) لكان أثرها بالأسفل؛ الثقب العالي يعني الإطلاق من الأمام بمسار مائل", "الكرسي مكسور"], ans: 1, hint: "تخيل مسار الرصاصة كخط مستقيم.", why: "الرصاصة التي تأتي من مكان عالٍ خلف الشخص لابد أن تنتهي في نقطة منخفضة بالجدار الأمامي. العكس يعني الإطلاق من الأمام." },

    { q: "مات رجل في غرفته الدافئة. وُجدت بجانبه 'كأس ماء' بها قطع ثلج لم تذب منذ ساعتين. لماذا اتهم المشتبه به؟", options: ["الثلج مالح", "الثلج في حرارة الغرفة يذوب خلال 30 دقيقة؛ بقاؤه يعني أنه وُضع حديثاً بعد الوفاة", "الكأس من بلاستيك"], ans: 1, hint: "كم يحتاج الثلج ليذوب؟", why: "بقاء الثلج دون ذوبان في بيئة دافئة يثبت أن المشتبه به كان موجوداً في الغرفة بعد وقوع الجريمة." },

    { q: "رجل مقتول بمسدس 'كاتم صوت'. الجيران قالوا سمعنا 'صوتاً خافتاً كالعطسة'. المحقق وجد الضحية في غرفة 'فارغة تماماً' من الأثاث. لماذا اتهم القاتل؟", options: ["لأن الغرفة واسعة", "الغرف الفارغة تسبب صدى صوت (Reverb) يضخم حتى أصوات كواتم الصوت؛ ادعاء سماع 'عطسة' كذبة متفق عليها", "لأن الباب مفتوح"], ans: 1, hint: "تأثير الصدى في الغرف الفارغة.", why: "الفيزياء الصوتية؛ الغياب الكلي للأثاث يجعل أي صوت مسموعاً بوضوح، كتم الصوت لا يعمل بكفاءة في الفراغ الصدوي." },
    { q: "ادعى مشتبه به أنه قفز من طائرة 'هليكوبتر' وهي متوقفة في الهواء (Hovering) ولم يصب بأذى. الارتفاع كان 10 أمتار. لماذا هو كاذب؟", options: ["الهليكوبتر سريعة", "القفز من 10 أمتار (3 أدوار) على أرض صلبة يسبب كسوراً بليغة حتماً", "المحرك حار"], ans: 1, hint: "تأثير الجاذبية من ارتفاع 10 أمتار.", why: "السقوط الحر من هذا الارتفاع يولد طاقة اصطدام لا يتحملها الهيكل العظمي البشري دون إصابة." },
    { q: "وُجدت جثة في ثلاجة موتى. المحقق لاحظ أن 'أظافر' الضحية توقفت عن النمو تماماً. لماذا اتهم الطبيب الشرعي؟", options: ["الأظافر لا تنمو", "خلافاً للشائع، الأظافر لا تنمو بعد الموت؛ ادعاء الطبيب بنموها يثبت محاولة تزييف وقت الوفاة", "الأظافر نظيفة"], ans: 1, hint: "حقيقة بيولوجية عن الموت.", why: "يتوقف نمو الخلايا فور توقف الدورة الدموية؛ أي ادعاء بنمو الأنسجة هو تضليل علمي." },
    { q: "رجل مقتول في مكتبه. وُجدت رسالة انتحار 'موقعة' بتاريخ '30 فبراير'. لماذا هي جريمة قتل؟", options: ["لأن الخط سيء", "شهر فبراير لا يأتي فيه يوم 30 أبداً؛ القاتل أخطأ في تزييف التاريخ", "الورق قديم"], ans: 1, hint: "راجع أيام التقويم الميلادي.", why: "فبراير 28 أو 29 يوماً فقط؛ وجود تاريخ 30 فبراير دليل قاطع على التزييف." },
    { q: "ادعى مشتبه به أنه رأى الجريمة عبر كاميرا 'حرارية' (Thermal) ورأى لون 'قميص' القاتل الأحمر. لماذا هو كاذب؟", options: ["الكاميرا مكسورة", "الكاميرا الحرارية ترصد درجات الحرارة فقط ولا تظهر الألوان الحقيقية للملابس", "القاتل كان بارداً"], ans: 1, hint: "كيف تعمل الكاميرات الحرارية؟", why: "الكاميرا الحرارية تظهر الأجسام ككتل ملونة (أصفر، أحمر، أزرق) حسب حرارتها، وليس لون القماش الفعلي." },
    { q: "وُجدت جثة في منجم فحم. الضحية كتب 'Pb'. المشتبه بهم: 'نحاس'، 'رصاص'، 'حديد'. من القاتل؟", options: ["نحاس", "رصاص", "حديد"], ans: 1, hint: "ما هو الرمز الكيميائي لـ Pb؟", why: "Pb هو الرمز الكيميائي لعنصر الرصاص في الجدول الدوري." },
    { q: "مات شخص بصعقة كهربائية من 'هاتف' متصل بالشاحن. المحقق وجد الشاحن 'أصلياً' والكهرباء 'مستقرة'. لماذا اتهم المشتبه به؟", options: ["الهاتف قديم", "الشواحن الأصلية معزولة تماماً ومستحيل أن تسبب صعقة قاتلة؛ القاتل تلاعب بالدائرة", "البطارية فارغة"], ans: 1, hint: "أمان الأجهزة الإلكترونية الأصلية.", why: "الهواتف الحديثة تعمل بجهد منخفض جداً (5-12 فولت) لا يقتل؛ الموت يعني توصيل تيار عالي (220 فولت) عمداً." },
    { q: "ادعى شاهد أنه سمع صوت 'كسر عظم' الضحية من مسافة 200 متر. لماذا هو كاذب؟", options: ["الصوت ضعيف", "صوت كسر العظام تردد منخفض جداً لا ينتقل في الهواء لهذه المسافة", "لأن الجو هادئ"], ans: 1, hint: "مدى انتقال الأصوات الميكانيكية الضعيفة.", why: "فيزيائياً، الموجة الصوتية لكسر العظم تتلاشى بعد أمتار قليلة؛ سماعها من 200 متر مستحيل." },
    { q: "رجل مقتول في مخبز. وُجدت بجانبه كمية من 'الدقيق' المشتعل. المشتبه به قال 'انفجر الدقيق وحده'. لماذا صدقه المحقق في البداية؟", options: ["لأن الدقيق قابل للانفجار", "غبار الدقيق في مكان مغلق بتركيز عالٍ يمكن أن ينفجر بسب شرارة صغيرة (Dust Explosion)", "لأن الفرن حار"], ans: 1, hint: "كيمياء الاحتراق والذرات الصغيرة.", why: "علمياً، غبار المواد العضوية كالدقيق والنشا شديد الانفجار إذا توفرت شرارة وتركيز عالٍ." },
    { q: "وُجدت جثة في يوم مثلج. المشتبه به قال إنه كان يقود سيارته بسرعة 200 كم/ساعة ولم ينزلق. لماذا كُشف؟", options: ["السيارة سريعة", "الفيزياء تمنع الثبات على الثلج في هذه السرعة بسبب انعدام الاحتكاك؛ الحادث لابد أن يقع", "الإطارات جديدة"], ans: 1, hint: "قانون الاحتكاك والسرعة.", why: "القيادة بهذه السرعة على الثلج تعني فقدان السيطرة حتماً؛ الادعاء يثبت عدم تواجده في الطريق." },
    { q: "مات شخص بجرعة زائدة من 'الأنسولين'. المشتبه به قال الضحية 'مريض سكر' وأخطأ في الجرعة. المحقق وجد سكر الضحية 'منخفضاً جداً' قبل الحقنة. لماذا اتهم المشتبه به؟", options: ["الأنسولين غالي", "مريض السكر لا يأخذ أنسولين إذا كان سكره منخفضاً؛ هذا يقتله فوراً، والقاتل أجبره عليه", "لأن الحقنة كبيرة"], ans: 1, hint: "متى يحتاج مريض السكر للأنسولين؟", why: "الأنسولين يخفض السكر؛ إعطاؤه لشخص سكره منخفض أصلاً هو جريمة قتل عمد." },
    { q: "ادعى مشتبه به أنه اختبأ في 'مغسلة سيارات' أوتوماتيكية وهي تعمل ولم يبتل. لماذا هو كاذب؟", options: ["المغسلة قوية", "المغسلة الأوتوماتيكية ترش الماء من كل الزوايا بقوة هائلة؛ البقاء جافاً مستحيل", "لأنه سريع"], ans: 1, hint: "طريقة عمل المغاسل الآلية.", why: "تصميم المغاسل يضمن وصول الماء لكل نقطة؛ الادعاء يكشف كذب الاختباء." },
    { q: "وُجدت جثة في حقل مغناطيسي عالٍ (غرفة MRI). المشتبه به قال قُتل بـ 'سكين حديد'. لماذا كُشف؟", options: ["السكين حاد", "في غرفة الرنين المغناطيسي، أي حديد سيُسحب بقوة هائلة للمغناطيس ولن يبقى في يد القاتل أو الجثة", "الرنين معطل"], ans: 1, hint: "تأثير المغناطيس القوي على المعادن.", why: "الفيزياء المغناطيسية تمنع استخدام أسلحة حديدية في هذه الغرف؛ السلاح لابد أن يكون من مادة غير مغناطيسية." },
    { q: "رجل مقتول بطلقة. المشتبه به قال كنت أستخدم 'ليزر' للإشارة ولم أؤذه. المحقق وجد 'حروقاً شبكية' في عين الضحية. لماذا اتهم؟", options: ["الليزر ضعيف", "استخدام ليزر عالي الطاقة يسبب حروقاً دائمة وعمى؛ هذا يثبت نية التعذيب قبل القتل", "الضوء أخضر"], ans: 1, hint: "تأثير الليزر على العين.", why: "الليزر العادي لا يترك حروقاً شبكية إلا إذا كان من نوع عسكري أو صناعي محرم استخدامه." },
    { q: "ادعى شاهد أنه سمع 'صوت محرك' سيارة كهربائية (تسلا) وهي تمر بجانبه بسرعة هادئة. لماذا هو كاذب؟", options: ["السيارة سريعة", "السيارات الكهربائية صامتة تماماً في السرعات المنخفضة ولا تصدر صوت محرك (احتراق)", "لأن الشارع مزدحم"], ans: 1, hint: "الفرق بين محركات البنزين والكهرباء.", why: "التكنولوجيا الحديثة؛ المحركات الكهربائية لا تصدر ضجيج الاحتكار المعتاد، مما يكشف كذب الشاهد." },
    { q: "وُجدت جثة في حمام سباحة ممتلئ بـ 'الكلور' بنسبة عالية جداً. المحقق لاحظ أن 'شعر' الضحية لم يتغير لونه. لماذا شك في وقت الوفاة؟", options: ["الكلور قليل", "الكلور بتركيز عالٍ يعمل كمبيض ويغير لون الشعر للأبيض/الأخضر خلال ساعات؛ ثبات اللون يعني الوفاة حديثة", "الشعر قصير"], ans: 1, hint: "تأثير الكلور على الألوان.", why: "التفاعل الكيميائي بين الكلور والصبغة الطبيعية للشعر يستغرق وقتاً؛ حالة الشعر تحدد مدة بقاء الجثة في الماء." },
    { q: "مات شخص في بيته. المشتبه به قال كنت 'أشاهد فيلماً' بقرص DVD والكهرباء كانت 'مقطوعة'. لماذا اتهم؟", options: ["الفيلم ممل", "مشغل الـ DVD والتلفاز يحتاجان طاقة كهربائية للعمل", "القرص مخدوش"], ans: 1, hint: "تشغيل الأجهزة الكهربائية.", why: "أبسط تناقض تقني يكشف كذب المشتبه به." },
    { q: "ادعى مشتبه به أنه هرب من الشرطة عبر 'نفق رياح' صناعي وهو يعمل. لماذا هو كاذب؟", options: ["النفق مظلم", "أنفاق الرياح تولد سرعات هواء تتجاوز 200 كم/ساعة؛ مستحيل الوقوف أو الحركة بداخلها لبشر", "لأن النفق ضيق"], ans: 1, hint: "قوة الهواء في أنفاق الاختبار.", why: "الفيزياء الميكانيكية؛ قوة دفع الهواء في الأنفاق الصناعية كفيلة بسحق أو قذف أي جسم بشري." },
    { q: "وُجدت جثة وعليها ملابس 'حريرية' محترقة جزئياً. المشتبه به قال 'اشتعلت من سيجارته'. لماذا كُشف؟", options: ["السيجارة باردة", "الحرير الطبيعي يقاوم الاحتراق ولا يشتعل بسهولة من مجرد سيجارة؛ لابد من وجود لهب مباشر", "الحرير غالي"], ans: 1, hint: "خصائص احتراق الحرير.", why: "التركيب البروتيني للحرير يجعله ينطفئ ذاتياً؛ احتراقه يعني استخدام مواد مساعدة (بنزين مثلاً)." },
    { q: "رجل مقتول بطلقة. المشتبه به قال كنت أرتدي 'سترة واقية' والطلقة اخترقتها وقتلت الضحية خلفي. السترة كانت 'سليمة'. لماذا هو القاتل؟", options: ["السترة قوية", "لو اخترقت الرصاصة السترة لتركت ثقباً واضحاً؛ سلامتها تعني أن الرصاصة لم تمر عبرها", "لأن السترة ثقيلة"], ans: 1, hint: "أثر الرصاص على الأجسام.", why: "الفيزياء المادية؛ لا يمكن لشيء اختراق شيء آخر دون ترك أثر مادي (ثقب)." },
    { q: "ادعى شاهد أنه رأى الجريمة عبر 'عدسة مكبرة' مقلوبة. لماذا هو كاذب؟", options: ["العدسة مكسورة", "العدسة المكبرة المقلوبة تصغر الأشياء جداً وتجعل رؤية التفاصيل مستحيلة", "العدسة متسخة"], ans: 1, hint: "بصريات العدسات اللامة.", why: "قلب العدسة المكبرة يغير البعد البؤري ويشتت الرؤية بدلاً من توضيحها." },
    { q: "وُجدت جثة في حقل قمح. المحقق وجد 'آثار إطارات' دراجة نارية بعمق 10 سم في 'أرض جافة'. لماذا اتهم المشتبه به؟", options: ["الدراجة سريعة", "الأرض الجافة الصلبة لا تترك آثاراً بهذا العمق إلا إذا كانت مبللة؛ القاتل رش الماء ليخلق آثاراً وهمية", "الإطارات قديمة"], ans: 1, hint: "تأثير ضغط الإطارات على أنواع التربة.", why: "تزييف الأدلة؛ محاولة خلق مسار وهمي في أرض لا تسمح بذلك فيزيائياً يكشف الجاني." },
    { q: "مات شخص بجرعة سم 'زرنيخ'. المشتبه به قال الضحية 'شرب ماءً كثيراً' قبل موته. المحقق وجد 'جفافاً' شديداً في أنسجة الضحية. لماذا اتهم؟", options: ["الماء ملوث", "الزرنيخ يسبب قيئاً وإسهالاً حاداً يؤدي للجفاف مهما شرب الضحية؛ كذب القاتل في منعه للماء عن الضحية", "لأن الماء مالح"], ans: 1, hint: "أعراض التسمم بالزرنيخ.", why: "القاتل حاول التظاهر بمساعدة الضحية بالماء، لكن حالة الجسد أثبتت حرمانه منه لتعجيل الوفاة." },
    { q: "ادعى مشتبه به أنه رأى الجريمة عبر 'منظار ليلي' (Night Vision) في عز 'الظهيرة'. لماذا هو كاذب؟", options: ["المنظار ثقيل", "استخدام المنظار الليلي في ضوء الشمس القوي يحرق الحساسات ويجعل الرؤية بيضاء تماماً ومستحيلة", "لأن الجو غائم"], ans: 1, hint: "كيف تعمل أجهزة الرؤية الليلية؟", why: "هذه الأجهزة تضخم الضوء؛ في النهار يكون الضوء كافياً جداً وتضخيمه يسبب 'عمى مؤقت' للجهاز والمستخدم." },
    { q: "وُجدت جثة في غواصة. الضحية كتب 'Au'. المشتبه بهم: 'فضي'، 'ذهبي'، 'نحاسي'. من القاتل؟", options: ["فضي", "ذهبي", "نحاسي"], ans: 1, hint: "ما هو الرمز الكيميائي لـ Au؟", why: "Au هو الرمز الكيميائي للذهب (Aurum) في الجدول الدوري." },
    { q: "رجل مقتول بطلقة. المشتبه به قال كنت أستخدم 'كاتم صوت' مصنوع من 'وسادة'. المحقق لم يجد أي 'ريش' أو 'قطن' في مكان الحادث. لماذا قبض عليه؟", options: ["الوسادة غالية", "إطلاق النار عبر وسادة ينشر حشوها في كل مكان بفعل ضغط الغاز؛ نظافة المكان تكتشف الكذب", "لأن الصوت كان عالياً"], ans: 1, hint: "تأثير ضغط الغاز عند خروج الرصاصة.", why: "الفيزياء الحركية؛ الانفجار الصغير عند الفوهة يمزق الوسادة حتماً وينشر محتواها." },
    { q: "ادعى شاهد أنه سمع صوت 'سقوط ريشة' على الأرض. لماذا اعتبره المحقق مشتبهاً به؟", options: ["لأن الريشة خفيفة", "الأذن البشرية لا تستطيع سماع ترددات سقوط الأجسام متناهية الصغر كالريشة؛ الادعاء يثبت المبالغة في الكذب", "لأن المكان صاخب"], ans: 1, hint: "حدود السمع البشري.", why: "استحالة بيولوجية؛ الادعاء بقوى خارقة للسمع يستخدم غالباً لتغطية الوجود في مسرح الجريمة." },
    { q: "مات شخص مسموماً بـ 'السيانيد'. المشتبه به قال 'كانت رائحة اللوز منتشرة'. لماذا قبض عليه المحقق؟", options: ["الرائحة جميلة", "ليس كل البشر يملكون الجين الذي يسمح لهم بشم رائحة السيانيد (اللوز المر)؛ القاتل خانته المعلومة", "لأن اللوز مسمم"], ans: 1, hint: "حقيقة وراثية عن شم السيانيد.", why: "40% من البشر لا يشمون السيانيد أبداً؛ القاتل افترض أن الجميع يشمها فذكرها لتأكيد روايته." },
    { q: "وُجدت جثة في قطب متجمد. المحقق وجد 'دم الضحية' سائلاً ولم يتجمد بعد 5 ساعات. لماذا اتهم الطبيب المرافق؟", options: ["الدم حار", "الدم يتجمد بسرعة في القطب؛ بقاؤه سائلاً يعني إضافة 'مواد مانعة للتجمد' عمداً لإخفاء وقت الوفاة", "لأن الضحية سمين"], ans: 1, hint: "درجة تجمد السوائل الحيوية.", why: "التلاعب بفيزياء السوائل؛ القاتل استخدم علمه الطبي لتضليل المحقق في تحديد وقت الجريمة." },

    { q: "رجل مقتول بطلقة. المشتبه به قال 'انفجرت الرصاصة في جيبي' فقتلت الضحية. المشتبه به لم يصب بأي حرق في فخذه. لماذا كُشف؟", options: ["الرصاصة صغيرة", "انفجار الرصاصة خارج المسدس يسبب شظايا وحروقاً في مكان الانفجار (الجيب)؛ سلامة القاتل تنفي القصة", "لأن الجيب واسع"], ans: 1, hint: "كيف تنفجر الرصاصة؟", why: "البارود يولد حرارة وضغطاً؛ استحالة حدوث انفجار 'نظيف' دون إصابة الشخص الحامل للرصاصة." },

    let used = new Set(), scores = { t1: 0, t2: 0 }, currentTeam = 1, currentStory = null, hintUsed = false;

    function startGame() {
        document.getElementById('nameT1').innerText = document.getElementById('t1').value || "فريق أ";
        document.getElementById('nameT2').innerText = document.getElementById('t2').value || "فريق ب";
        document.getElementById('setup').classList.remove('active');
        document.getElementById('gameArea').classList.add('active');
        updateTurn();
    }

    function updateTurn() {
        const name = currentTeam === 1 ? document.getElementById('nameT1').innerText : document.getElementById('nameT2').innerText;
        document.getElementById('turnTag').innerText = "دور فريق: " + name;
    }

    function loadStory(pts) {
        let avail = allStories[pts].filter(s => !used.has(s.q));
        if (!avail.length) return alert("انتهت الأسئلة!");
        currentStory = avail[Math.floor(Math.random() * avail.length)];
        used.add(currentStory.q);
        currentStory.basePoints = pts;
        hintUsed = false;
        document.getElementById('storyText').innerText = currentStory.q;
        document.getElementById('hintArea').style.display = "none";
        document.getElementById('explanation').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('hintBtn').style.display = "inline-block";
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        currentStory.options.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = "opt-btn"; b.innerText = o;
            b.onclick = () => check(i);
            optDiv.appendChild(b);
        });
        document.getElementById('levels').style.display = "none";
        document.getElementById('storyDisplay').style.display = "block";
    }

    function useHint() {
        hintUsed = true;
        document.getElementById('hintArea').innerText = "💡 تلميح: " + currentStory.hint;
        document.getElementById('hintArea').style.display = "block";
        document.getElementById('hintBtn').style.display = "none";
    }

    function check(idx) {
        const exp = document.getElementById('explanation');
        exp.style.display = "block";
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        let win = (idx === currentStory.ans);
        if(win) {
            let p = hintUsed ? currentStory.basePoints/2 : currentStory.basePoints;
            if(currentTeam === 1) scores.t1 += p; else scores.t2 += p;
            exp.innerHTML = "✅ صح! <br><small>" + currentStory.why + "</small>";
            exp.style.background = "var(--success)";
        } else {
            exp.innerHTML = "❌ خطأ! القاتل: " + currentStory.options[currentStory.ans] + "<br><small>" + currentStory.why + "</small>";
            exp.style.background = "var(--error)";
        }
        document.getElementById('s1').innerText = scores.t1;
        document.getElementById('s2').innerText = scores.t2;
        
        if (scores.t1 >= 100 || scores.t2 >= 100) {
            showWinner();
        } else {
            document.getElementById('nextBtn').style.display = "inline-block";
        }
    }

    function showWinner() {
        const winner = scores.t1 >= 100 ? document.getElementById('nameT1').innerText : document.getElementById('nameT2').innerText;
        document.getElementById('gameArea').style.display = "none";
        document.getElementById('winScreen').style.display = "block";
        document.getElementById('winnerName').innerText = winner;
        
        // تأثير الاحتفال
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }

    function resetTurn() {
        currentTeam = currentTeam === 1 ? 2 : 1;
        document.getElementById('box1').classList.toggle('active-turn');
        document.getElementById('box2').classList.toggle('active-turn');
        updateTurn();
        document.getElementById('levels').style.display = "block";
        document.getElementById('storyDisplay').style.display = "none";
    }
</script>
