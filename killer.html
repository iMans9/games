<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي المحققين - نظام التلميح ومنع التكرار</title>
    <style>
        :root { --danger: #ff4757; --gold: #ffa502; --bg: #0f172a; --card: #1e293b; --text: #f1f2f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 95%; max-width: 800px; text-align: center; }
        
        /* تصميم الخلية */
        .hex-table { background: var(--card); padding: 30px; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 20px auto; }
        .hex-row { display: flex; justify-content: center; margin-bottom: -4%; }
        .hex { position: relative; width: 11%; padding: 4.5% 0; background: #FDFFCD; margin: 0.2rem 1%; font-size: 1.5rem; color: #111; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .hex:before, .hex:after { content: ""; position: absolute; top: 0; width: 28%; height: 100%; background: inherit; }
        .hex:before { left: -25%; clip-path: polygon(100% 0, 100% 100%, 0% 50%); }
        .hex:after { right: -25%; clip-path: polygon(0 0, 0 100%, 100% 50%); }
        
        .hex.used { background: #475569 !important; color: #94a3b8 !important; cursor: default; }
        .hex.green { background: #22c55e !important; color: white; }
        .hex.red { background: #ef4444 !important; color: white; }

        /* واجهة السؤال */
        #q-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 550px; background: white; color: #1e293b; padding: 30px; border-radius: 20px; z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,0.9); border: 4px solid var(--gold); }
        .opt-btn { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; background: #f8fafc; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .opt-btn:hover { border-color: var(--gold); background: #fffbeb; }
        .hint-btn { background: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        
        .score-box { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .team { padding: 15px; background: #1e293b; border-radius: 12px; flex: 1; margin: 0 10px; border: 3px solid transparent; }
        .active-team { border-color: var(--gold); background: #334155; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box">
        <div id="p1-box" class="team active-team">المحقق 1<br><b id="s1" style="font-size: 2em; color: var(--gold);">0</b></div>
        <div id="p2-box" class="team">المحقق 2<br><b id="s2" style="font-size: 2em; color: var(--gold);">0</b></div>
    </div>
    
    <div class="hex-table" id="board"></div>
    <p style="color: #94a3b8;">* الفوز من 150 نقطة | التلميح يخصم نصف النقاط</p>
</div>

<div class="overlay" id="overlay"></div>
<div id="q-box">
    <div id="q-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span id="points-badge" style="background:var(--gold); color:black; padding:5px 10px; border-radius:5px; font-weight:bold;">30 نقطة</span>
        <button class="hint-btn" onclick="useHint()">💡 طلب تلميح (-50%)</button>
    </div>
    <h3 id="qText" style="line-height:1.6; text-align:right;"></h3>
    <p id="hint-text" style="display:none; background:#ede9fe; color:#5b21b6; padding:10px; border-radius:8px; font-style:italic; margin-bottom:15px;"></p>
    <div id="options"></div>
    <div id="explanation" style="margin-top:15px; font-weight:bold; display:none; padding:15px; border-radius:10px;"></div>
    <button id="close-btn" class="opt-btn" style="background:#22c55e; color:white; display:none; border:none;" onclick="closeQ()">متابعة التحقيق ⬅️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
let scores = [0, 0], turn = 0, currentQPoints = 30;
const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split("");

// مخزن القضايا الحقيقية (لضمان عدم التكرار والسهولة)
const rawPuzzles = [
    {q: "وُجد مقتولاً وبجانبه مسجل صوت. عند الضغط على زر التشغيل: 'أنا أنتحر' ثم طلقة. لماذا قبضوا على القاتل؟", h: "فكر في كيفية إيقاف التسجيل بعد الموت.", o: ["لأن التسجيل لا يعتبر دليلاً", "لأن المنتحر لا يستطيع ضغط زر الإيقاف بعد إطلاق النار", "لأن صوته كان حزيناً"], a: 1, w: "المنتحر يموت فوراً، فمن الذي أوقف المسجل؟ القاتل طبعاً!"},
    {q: "ادعى رجل أنه صور الجريمة من خلف نافذة عليها 'بخار كثيف'. لماذا كذب؟", h: "ماذا يحدث للبخار عند لمسه أو التصوير خلفه؟", o: ["لأن الكاميرا لا تعمل في البرد", "لأن البخار يشتت الضوء ويمنع الرؤية الواضحة تماماً", "لأن البخار يختفي بسرعة"], a: 1, w: "البخار الكثيف يجعل الزجاج معتماً ولا يمكن التعرف على الملامح من خلفه."},
    {q: "جثة في الصحراء وبمعدتها ماء بارد جداً رغم أن درجة الحرارة 50. كيف كشفوا القاتل؟", h: "فكر في درجة حرارة الجسم الطبيعية والامتصاص.", o: ["الماء يبرد الجسم دائماً", "الجسم العطشان يمتص الماء فوراً ويجعله بحرارة الجسم", "لأن القاتل جلب ماءً من الثلاجة"], a: 1, w: "لو مات عطشاً لامتص جسمه الماء؛ بقاؤه بارداً يعني أنه قُتل ثم سُقي الماء لتضليل الوقت."},
    {q: "مات في مكتبه والمدفأة تعمل بأقصى طاقتها في عز الصيف. ما هو هدف القاتل؟", h: "الحرارة ماذا تفعل في سرعة تحلل الأنسجة؟", o: ["لتدفئة المكتب", "لتسريع تحلل الجثة وتضليل وقت الوفاة الحقيقي", "لإخفاء البصمات بالحرارة"], a: 1, w: "الحرارة العالية تسرع 'تصلب الجثة' مما يخدع الطبيب الشرعي في تحديد ساعة الموت."},
    {q: "رجل ادعى سرقة حقيبته في مترو لندن الساعة 3 فجراً. لماذا قبضوا عليه؟", h: "هل المترو يعمل 24 ساعة في كل المدن؟", o: ["لا يوجد لصوص فجراً", "لأن المترو يغلق للصيانة في هذا الوقت ولا يوجد ركاب", "لأن الحقيبة كانت ثقيلة"], a: 1, w: "معظم خطوط المترو العالمية تغلق بعد منتصف الليل، فادعاء الزحام والسرقة كذبة."},
    {q: "وجدت بصمات القاتل على 'مقبض الباب من الداخل' فقط. لماذا هو المتهم الأول؟", h: "كيف دخل وخرج دون لمس المقبض من الخارج؟", o: ["لأن بصماته واضحة", "لأنه مسح بصماته من الخارج ونسي الداخل وهو يهرب", "لأنه لم يلبس قفازات"], a: 1, w: "مسح الخارج ونسيان الداخل هو خطأ شائع يثبت وجوده في مسرح الجريمة."},
    {q: "مات شخص مسموماً بالملح. المشتبه به أكل من نفس الطعام ولم يمت. كيف؟", h: "فكر في طريقة وضع الملح في الصحن.", o: ["لأن لديه مناعة", "لأن القاتل وضع السم في مملحة الضحية الخاصة فقط", "لأن السم مفعوله بطيء"], a: 1, w: "تخصيص السم في أدوات الضحية الشخصية (المملحة) ينجي القاتل."}
];

// دالة توزيع الأسئلة على الحروف بدون تكرار
function getPuzzle() {
    if (rawPuzzles.length === 0) return {q: "انتهت القضايا!", o: ["-"], a:0, w: "لا يوجد"};
    const idx = Math.floor(Math.random() * rawPuzzles.length);
    return rawPuzzles.splice(idx, 1)[0]; // حذف السؤال فور اختياره
}

function initBoard() {
    const board = document.getElementById('board');
    let lIdx = 0;
    for (let r = 0; r < 5; r++) {
        const row = document.createElement('div');
        row.className = 'hex-row';
        for (let c = 0; c < 6; c++) {
            if (lIdx < letters.length) {
                const hex = document.createElement('div');
                hex.className = 'hex';
                hex.innerText = letters[lIdx];
                const p = getPuzzle();
                hex.onclick = () => openQ(hex, p);
                row.appendChild(hex);
                lIdx++;
            }
        }
        board.appendChild(row);
    }
}

function openQ(hex, p) {
    if (hex.classList.contains('used')) return;
    window.currentHex = hex;
    window.currentPuzzle = p;
    currentQPoints = 30;
    
    document.getElementById('points-badge').innerText = "30 نقطة";
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('q-box').style.display = 'block';
    document.getElementById('qText').innerText = p.q;
    document.getElementById('hint-text').style.display = 'none';
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('close-btn').style.display = 'none';
    
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = "";
    p.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAns(i);
        optDiv.appendChild(btn);
    });
}

function useHint() {
    const hint = document.getElementById('hint-text');
    hint.innerText = "💡 تلميح: " + window.currentPuzzle.h;
    hint.style.display = 'block';
    currentQPoints = 15; // خصم النصف
    document.getElementById('points-badge').innerText = "15 نقطة (تلميح مفعل)";
}

function checkAns(selected) {
    const exp = document.getElementById('explanation');
    exp.style.display = 'block';
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    
    if (selected === window.currentPuzzle.a) {
        exp.innerText = "✅ أصبت! " + window.currentPuzzle.w;
        exp.style.background = "#dcfce7"; exp.style.color = "#166534";
        scores[turn] += currentQPoints;
        window.currentHex.classList.add('green');
        confetti();
    } else {
        exp.innerText = "❌ أخطأت! " + window.currentPuzzle.w;
        exp.style.background = "#fee2e2"; exp.style.color = "#991b1b";
        window.currentHex.classList.add('red');
    }
    
    window.currentHex.classList.add('used');
    document.getElementById('close-btn').style.display = 'block';
    updateUI();
    if (scores[turn] >= 150) alert("🏆 مبروك! فاز الفريق " + (turn + 1));
}

function closeQ() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('q-box').style.display = 'none';
    turn = 1 - turn;
    updateUI();
}

function updateUI() {
    document.getElementById('s1').innerText = scores[0];
    document.getElementById('s2').innerText = scores[1];
    document.getElementById('p1-box').className = turn === 0 ? "team active-team" : "team";
    document.getElementById('p2-box').className = turn === 1 ? "team active-team" : "team";
}

initBoard();
</script>
</body>
</html>
