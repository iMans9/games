<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من القاتل لعيون أحمد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #eccc68;
            --dark-bg: #0a0a0b;
            --card-bg: #1e1e26;
            --success: #2ed573;
            --error: #ff6b81;
            --text: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #333;
            text-align: center;
            position: relative;
        }

        h1 { font-size: 2.5em; color: var(--secondary); margin-bottom: 30px; text-shadow: 0 5px 15px rgba(236, 204, 104, 0.2); }

        .setup, .game-area { display: none; }
        .active { display: block; }

        input {
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #333;
            background: #121212;
            color: white;
            width: 85%;
            margin-bottom: 20px;
            font-size: 1.1em;
            transition: 0.3s;
            text-align: center;
        }
        input:focus { border-color: var(--secondary); outline: none; }

        button {
            padding: 15px 30px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0px #b33939;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0px 0px #b33939; }
        button:hover { filter: brightness(1.1); }

        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-box {
            flex: 1;
            padding: 20px;
            border-radius: 20px;
            background: #25252d;
            border: 2px solid transparent;
            transition: 0.5s;
        }

        .team-box.active-turn {
            border-color: var(--secondary);
            transform: scale(1.05);
            background: #2d2d3a;
            box-shadow: 0 0 30px rgba(236, 204, 104, 0.1);
        }

        .points { font-size: 2.5em; display: block; color: var(--secondary); font-weight: 900; margin-top: 10px; }

        .turn-tag {
            background: var(--secondary);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .level-selection h3 { margin-bottom: 20px; opacity: 0.8; }
        .level-btn { width: 100%; margin: 10px 0; }
        .lvl-10 { background: #1e90ff; box-shadow: 0 4px 0 #0972d4; }
        .lvl-20 { background: #ffa502; box-shadow: 0 4px 0 #cc8400; }
        .lvl-30 { background: #8258fa; box-shadow: 0 4px 0 #5f3dc4; }

        .story-box {
            background: #ffffff;
            color: #2c3e50;
            padding: 30px;
            border-radius: 25px;
            text-align: right;
            margin: 25px 0;
            line-height: 1.8;
            font-size: 1.2em;
            position: relative;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .opt-btn { background: #34495e; box-shadow: 0 4px 0 #2c3e50; width: 100%; }

        .hint-text {
            background: #fff9db;
            color: #856404;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            display: none;
            border-right: 6px solid #fab005;
            font-weight: bold;
            animation: fadeInDown 0.5s;
        }

        .explanation {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            font-weight: bold;
            animation: flipInX 0.7s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <h1>🕵️‍♂️ من القاتل لعيون أحمد 🕵️‍♀️</h1>

    <div id="setup" class="setup active">
        <input type="text" id="team1Name" placeholder="اسم الفريق الأول (أ)">
        <input type="text" id="team2Name" placeholder="اسم الفريق الثاني (ب)">
        <br>
        <button onclick="startGame()">ابدأ التحقيق 🔍</button>
    </div>

    <div id="gameArea" class="game-area">
        <div id="turnTag" class="turn-tag">دور فريق: -</div>
        
        <div class="score-board">
            <div id="box1" class="team-box active-turn">
                <span id="displayT1">-</span>
                <span class="points" id="score1">0</span>
            </div>
            <div id="box2" class="team-box">
                <span id="displayT2">-</span>
                <span class="points" id="score2">0</span>
            </div>
        </div>

        <div id="levelSelection" class="animate__animated animate__fadeInUp">
            <h3>اختر مستوى القضية:</h3>
            <button class="level-btn lvl-10" onclick="loadStory(10)">جُنحة بسيطة (10 ن)</button>
            <button class="level-btn lvl-20" onclick="loadStory(20)">جريمة غامضة (20 ن)</button>
            <button class="level-btn lvl-30" onclick="loadStory(30)">قضية محنكة (30 ن)</button>
        </div>

        <div id="storyDisplay" style="display:none;">
            <div class="story-box animate__animated animate__zoomIn">
                <div id="pointsBadge" style="color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
                <div id="storyText"></div>
                <div id="hintArea" class="hint-text"></div>
                <div id="options" class="options-grid"></div>
            </div>
            
            <button id="hintBtn" style="background:#f39c12; box-shadow: 0 4px 0 #d35400;" onclick="useHint()">💡 طلب تلميح</button>
            <div id="explanation" class="explanation"></div>
            <br>
            <button id="nextBtn" style="display:none; background:#7f8c8d; width:100%; box-shadow:0 4px 0 #5a6268" onclick="resetTurn()">القضية التالية ⬅️</button>
        </div>
    </div>
</div>

<script>
    // بنك الأسئلة مع نظام منع التكرار
    const allStories = {
        10: [
            { q: "رجل وُجد مقتولاً في منزله يوم الأحد. الخادم قال كان يغسل السيارة، الطباخ قال كان يجهز الغداء، البواب قال كان يستلم البريد. من القاتل؟", options: ["الخادم", "الطباخ", "البواب"], ans: 2, hint: "هل يوجد توزيع بريد يوم الأحد؟", why: "البواب هو القاتل؛ لأنه لا يوجد توزيع بريد رسمي في أيام الآحاد." },
            { q: "مات شخص في مكتبه. المشتبه بهم: السكرتير (كان يصور أوراقاً)، المحاسب (كان يراجع كشف رواتب شهر يوليو وهو في شهر يناير)، المنظف (كان يمسح الزجاج). من الكاذب؟", options: ["السكرتير", "المحاسب", "المنظف"], ans: 1, hint: "المحاسب يراجع رواتب أي شهر؟", why: "المحاسب؛ لأنه لا يعقل مراجعة رواتب شهر يوليو (الصيف) ونحن في شهر يناير (الشتاء)." }
        ],
        20: [
            { q: "وُجدت جثة في غابة مطيرة. المشتبه به ادعى أنه كان يحرق أوراق الشجر الجافة للتخلص منها. لماذا قبضت الشرطة عليه فوراً؟", options: ["لأنه لا يملك ولاعة", "لأن الغابة المطيرة لا توجد بها أوراق جافة", "لأن الحريق ممنوع"], ans: 1, hint: "فكر في طبيعة الغابة 'المطيرة'.", why: "في الغابة المطيرة، الرطوبة عالية جداً والأوراق دائماً مبللة، فمن المستحيل وجود أوراق جافة لحرقها." },
            { q: "رجل وُجد مقتولاً في غرفته الدافئة وبجانبه بركة ماء صغيرة. لم يكن هناك أي سلاح. كيف قُتل؟", options: ["بالغرق", "بطلقة ثلجية", "بالسم"], ans: 1, hint: "الماء كان صلباً ثم ذاب..", why: "قُتل بطلقة من 'الثلج'؛ أطلقها القاتل فقتلت الضحية ثم ذابت بسبب دفء الغرفة واختفى السلاح." }
        ],
        30: [
            { q: "في جريمة سرقة، ادعى المشتبه به أنه كان يشاهد شروق الشمس من نافذة مكتبه التي تطل على جهة 'الغرب'. لماذا تم اعتقاله؟", options: ["لأنه كان نائماً", "لأن الشمس تشرق من الشرق", "لأن النافذة كانت مغلقة"], ans: 1, hint: "الجهات الجغرافية الأساسية!", why: "لأن الشمس تشرق من جهة الشرق دائماً، فمن المستحيل رؤية الشروق من نافذة تطل على الغرب." },
            { q: "وُجد جراح مشهور مقتولاً. المشتبه بهم: مساعده (قال كان يعقم الأدوات لمدة ساعتين)، الممرضة (قالت كانت تجلب أكياس الدم)، فني الأشعة (قال كان يصور المريض). الأدوات المعقمة كانت 'باردة' تماماً. من القاتل؟", options: ["المساعد", "الممرضة", "الفني"], ans: 0, hint: "عملية التعقيم تتم بالحرارة العالية..", why: "المساعد؛ لأن الأدوات بعد التعقيم تظل ساخنة لفترة، وكونها باردة يعني أنه لم يعقم شيئاً وكان يكذب." }
        ]
    };

    // نظام إدارة الأسئلة المستخدمة
    let usedIds = new Set();
    let scores = { t1: 0, t2: 0 };
    let currentTeam = 1;
    let currentStory = null;
    let hintUsed = false;

    function startGame() {
        const n1 = document.getElementById('team1Name').value || "فريق أ";
        const n2 = document.getElementById('team2Name').value || "فريق ب";
        document.getElementById('displayT1').innerText = n1;
        document.getElementById('displayT2').innerText = n2;
        updateTurnDisplay();
        document.getElementById('setup').classList.remove('active');
        document.getElementById('gameArea').classList.add('active');
    }

    function updateTurnDisplay() {
        const name = currentTeam === 1 ? document.getElementById('displayT1').innerText : document.getElementById('displayT2').innerText;
        document.getElementById('turnTag').innerText = "دور فريق: " + name;
    }

    function loadStory(pts) {
        // تصفية الأسئلة التي لم تستخدم بعد في هذا المستوى
        let available = allStories[pts].filter(s => !usedIds.has(s.q));
        
        if (available.length === 0) {
            alert("انتهت أسئلة هذا المستوى! جرب مستوى آخر.");
            return;
        }

        currentStory = available[Math.floor(Math.random() * available.length)];
        usedIds.add(currentStory.q); // تسجيل السؤال كـ "مستخدم"
        
        currentStory.basePoints = pts;
        hintUsed = false;

        document.getElementById('pointsBadge').innerText = "قيمة القضية: " + pts + " نقطة";
        document.getElementById('storyText').innerText = currentStory.q;
        document.getElementById('hintArea').style.display = "none";
        document.getElementById('explanation').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('hintBtn').style.display = "inline-block";
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        currentStory.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn animate__animated animate__fadeIn";
            btn.innerText = opt;
            btn.style.animationDelay = (index * 0.1) + "s";
            btn.onclick = () => checkAnswer(index);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('levelSelection').style.display = "none";
        document.getElementById('storyDisplay').style.display = "block";
    }

    function useHint() {
        hintUsed = true;
        const hintDiv = document.getElementById('hintArea');
        hintDiv.innerText = "💡 تلميح: " + currentStory.hint;
        hintDiv.style.display = "block";
        document.getElementById('pointsBadge').innerText = "القيمة الحالية: " + (currentStory.basePoints / 2) + " نقطة";
        document.getElementById('hintBtn').style.display = "none";
    }

    function checkAnswer(idx) {
        const expDiv = document.getElementById('explanation');
        expDiv.style.display = "block";
        document.querySelectorAll('.opt-btn').forEach(b => {
            b.disabled = true;
            b.style.opacity = "0.5";
        });

        if(idx === currentStory.ans) {
            let earned = hintUsed ? currentStory.basePoints / 2 : currentStory.basePoints;
            expDiv.innerHTML = "✅ إجابة صحيحة! <br><small>" + currentStory.why + "</small>";
            expDiv.style.background = "var(--success)";
            expDiv.className = "explanation animate__animated animate__tada";
            if(currentTeam === 1) scores.t1 += earned;
            else scores.t2 += earned;
        } else {
            expDiv.innerHTML = "❌ إجابة خاطئة! <br>القاتل الحقيقي هو: " + currentStory.options[currentStory.ans] + "<br><small>" + currentStory.why + "</small>";
            expDiv.style.background = "var(--error)";
            expDiv.className = "explanation animate__animated animate__headShake";
        }

        document.getElementById('score1').innerText = scores.t1;
        document.getElementById('score2').innerText = scores.t2;
        document.getElementById('nextBtn').style.display = "inline-block";
        document.getElementById('hintBtn').style.display = "none";
    }

    function resetTurn() {
        currentTeam = currentTeam === 1 ? 2 : 1;
        document.getElementById('box1').classList.toggle('active-turn');
        document.getElementById('box2').classList.toggle('active-turn');
        updateTurnDisplay();
        
        document.getElementById('levelSelection').style.display = "block";
        document.getElementById('storyDisplay').style.display = "none";
    }
</script>

</body>
</html>
