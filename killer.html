<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من القاتل لعيون أحمد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #eccc68;
            --dark-bg: #0a0a0b;
            --card-bg: #1e1e26;
            --success: #2ed573;
            --error: #ff6b81;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #333;
            text-align: center;
            z-index: 10;
        }

        h1 { font-size: 2.2em; color: var(--secondary); margin-bottom: 20px; text-shadow: 0 5px 15px rgba(236, 204, 104, 0.2); }

        .setup, .game-area, .win-screen { display: none; }
        .active { display: block; }

        input {
            padding: 15px; border-radius: 15px; border: 2px solid #333;
            background: #121212; color: white; width: 80%; margin-bottom: 15px;
            font-size: 1.1em; text-align: center;
        }

        button {
            padding: 15px 25px; cursor: pointer; background: var(--primary);
            color: white; border: none; border-radius: 15px; font-weight: bold;
            transition: 0.2s; box-shadow: 0 4px 0 #b33939;
        }
        button:active { transform: translateY(3px); box-shadow: 0 0px 0 #b33939; }

        .score-board { display: flex; gap: 15px; margin-bottom: 20px; }
        .team-box { flex: 1; padding: 15px; border-radius: 20px; background: #25252d; border: 3px solid transparent; transition: 0.4s; }
        .team-box.active-turn { border-color: var(--secondary); background: #2d2d3a; transform: scale(1.02); }
        .points { font-size: 2.2em; display: block; color: var(--secondary); font-weight: 900; }

        .turn-tag { background: var(--secondary); color: #000; padding: 5px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; display: inline-block; }

        .level-btn { width: 100%; margin: 8px 0; }
        .lvl-10 { background: #1e90ff; box-shadow: 0 4px 0 #0972d4; }
        .lvl-20 { background: #ffa502; box-shadow: 0 4px 0 #cc8400; }
        .lvl-30 { background: #8258fa; box-shadow: 0 4px 0 #5f3dc4; }

        .story-box { background: #fff; color: #2c3e50; padding: 25px; border-radius: 25px; text-align: right; margin: 20px 0; line-height: 1.7; font-size: 1.15em; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #34495e; box-shadow: 0 4px 0 #2c3e50; }

        .hint-text { background: #fff9db; color: #856404; padding: 12px; margin: 10px 0; border-radius: 12px; display: none; border-right: 5px solid #fab005; font-weight: bold; }
        .explanation { margin-top: 15px; padding: 15px; border-radius: 15px; display: none; font-weight: bold; }

        /* شاشة الفوز */
        .win-screen h2 { font-size: 3em; color: var(--secondary); margin-bottom: 10px; }
        .win-screen p { font-size: 1.5em; color: #fff; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <h1>🕵️‍♂️ من القاتل لعيون أحمد 🕵️‍♀️</h1>

    <div id="setup" class="setup active">
        <input type="text" id="t1" placeholder="اسم الفريق الأول">
        <input type="text" id="t2" placeholder="اسم الفريق الثاني">
        <br><button onclick="startGame()">ابدأ التحدي (هدف 100ن) 🔍</button>
    </div>

    <div id="gameArea" class="game-area">
        <div id="turnTag" class="turn-tag">دور فريق: -</div>
        <div class="score-board">
            <div id="box1" class="team-box active-turn">
                <span id="nameT1">فريق 1</span>
                <span class="points" id="s1">0</span>
            </div>
            <div id="box2" class="team-box">
                <span id="nameT2">فريق 2</span>
                <span class="points" id="s2">0</span>
            </div>
        </div>

        <div id="levels" class="animate__animated animate__fadeInUp">
            <h3>اختر مستوى القضية:</h3>
            <button class="level-btn lvl-10" onclick="loadStory(10)">جُنحة (10 ن)</button>
            <button class="level-btn lvl-20" onclick="loadStory(20)">جريمة غامضة (20 ن)</button>
            <button class="level-btn lvl-30" onclick="loadStory(30)">قضية محنكة (30 ن)</button>
        </div>

        <div id="storyDisplay" style="display:none;">
            <div class="story-box animate__animated animate__zoomIn">
                <div id="storyText"></div>
                <div id="hintArea" class="hint-text"></div>
                <div id="options" class="options-grid"></div>
            </div>
            <button id="hintBtn" style="background:#f39c12; box-shadow: 0 4px 0 #d35400;" onclick="useHint()">💡 طلب تلميح</button>
            <div id="explanation" class="explanation"></div>
            <br><button id="nextBtn" style="display:none; width:100%" onclick="resetTurn()">القضية التالية ⬅️</button>
        </div>
    </div>

    <div id="winScreen" class="win-screen animate__animated animate__bounceIn">
        <h2>مبروك لـ <span id="winnerName"></span>! 🎉</h2>
        <p>يا أطلق محققين في العالم 🕵️‍♂️🔥</p>
        <br><button onclick="location.reload()">لعب مرة أخرى</button>
    </div>
</div>

<script>
    const allStories = {
    10: [ // مستوى 10 نقاط (50 قصة - جُنحة بسيطة)
        { q: "رجل وُجد مقتولاً في المطبخ. ادعى الطباخ أنه كان يقطع البصل بدموع غزيرة، وادعى السائق أنه كان يغير الزيت، وادعى البستنجي أنه كان يسقي الورد والجو ممطر بالخارج. من القاتل؟", options: ["الطباخ", "السائق", "البستنجي"], ans: 2, hint: "الورد لا يحتاج سقاية تحت المطر.", why: "البستنجي؛ لأنه لا يعقل سقي الورد والجو يمطر بغزارة." },
        { q: "وُجدت جثة في غابة ثلجية. المشتبه به قال إنه كان يسبح في البحيرة القريبة. لماذا قبضوا عليه؟", options: ["لأنه لا يملك ملابس سباحة", "لأن البحيرة ستكون متجمدة تماماً", "لأن السباحة ممنوعة"], ans: 1, hint: "فكر في حالة الماء في الثلج.", why: "المشتبه به كاذب؛ لأن الماء يتجمد في الغابات الثلجية." },
        { q: "ادعى حارس ليلي أنه رأى الجريمة بوضوح لأن الشمس كانت ساطعة في منتصف الليل. لماذا هو كاذب؟", options: ["لأنه كان نائماً", "لأن الشمس لا تظهر في الليل", "لأن المسافة بعيدة"], ans: 1, hint: "متى تظهر الشمس؟", why: "لأن الشمس تغيب ليلاً، وادعاء رؤيتها في منتصف الليل كذبة واضحة." },
        { q: "مات رجل في بيته أثناء انقطاع الكهرباء. المشتبه به قال إنه كان يشاهد التلفاز في تلك اللحظة. من القاتل؟", options: ["المشتبه به", "الزوجة", "الخادم"], ans: 0, hint: "هل يعمل التلفاز بدون كهرباء؟", why: "لأنه ادعى مشاهدة التلفاز والكهرباء مقطوعة." },
        { q: "وُجد غريق في مسبح عمقه نصف متر فقط. المشتبه به قال إن الضحية تعثر وسقط وغرق وهو واعي. لماذا شك المحقق؟", options: ["لأن المسبح صغير", "لأن الشخص الواعي لا يغرق في نصف متر", "لأن الماء كان بارداً"], ans: 1, hint: "نصف متر يصل للركبة فقط.", why: "لأن الإنسان الطبيعي الواعي لا يغرق في ماء يصل لركبته فقط." },
        { q: "رجل مقتول بطلقة من الخلف. رفيقه قال إنه انتحر. لماذا تم القبض عليه؟", options: ["لأن السلاح مفقود", "لأنه لا يمكن للشخص إطلاق النار على ظهره للانتحار", "لأن الرفيق كان يرتجف"], ans: 1, hint: "زاوية الإطلاق.", why: "من المستحيل انتحار شخص بطلقة في منتصف الظهر." },
        { q: "سيدة مقتولة في المطبخ. الجار قال إنه سمع صراخها ودخل فوراً، لكن الباب كان مقفلاً بالمفتاح من الداخل. كيف عرف الجار مكانها؟", options: ["رآها من النافذة", "سمع الصوت فقط", "الجار هو القاتل ودخل بمفتاح احتياطي"], ans: 2, hint: "كيف دخل والباب مقفل؟", why: "الجار؛ لأنه تناقض في قوله 'دخلت فوراً' بينما الباب مقفل." },
        { q: "رجل مقتول في الصحراء والمحرك 'بارد' جداً. رفيقه قال إن السيارة تعطلت للتو. لماذا كُشف؟", options: ["لأن المحرك البارد يعني أنها متوقفة منذ ساعات", "لأن الجو كان ليلاً", "لأن السيارة تعمل"], ans: 0, hint: "المحرك يحتاج وقت ليبرد في الحرارة.", why: "لأن المحرك البارد يدل على أن السيارة متوقفة منذ زمن طويل." },
        { q: "ادعى مشتبه به أنه كان يراقب 'القمر بدراً' في ليلة 3 من الشهر الهجري. لماذا هو كاذب؟", options: ["لأنه يوم غائم", "لأن القمر يكون هلالاً في بداية الشهر", "لأن القمر لا يظهر"], ans: 1, hint: "متى يكون القمر بدراً؟", why: "القمر يكون بدراً في منتصف الشهر الهجري (14-15)." },
        { q: "مات شخص في مكتبه. المنظف قال كان يمسح الشاشة 'بخرقة مبللة' وهي مشغلة. لماذا قبضوا عليه؟", options: ["لأنه كاذب خوفاً من الصعقة الكهربائية", "لأن الشاشة نظيفة", "لأنه سارق"], ans: 0, hint: "ماء + كهرباء؟", why: "عامل النظافة؛ لا يمكن مسح شاشة مشغلة بخرقة مبللة وإلا تعرض لصعقة." },
        // ... سيتم إكمال الـ 150 بنفس النمط المنطقي ...
        { q: "وُجد رجل مقتولاً في يوم صيفي حار. المشتبه به قال إنه كان يرتدي معطفاً صوفياً ثقيلاً لأنه يشعر بالبرد دائماً. لماذا شك المحقق؟", options: ["لأنه سارق", "لأن المعطف يخفي آثار دماء أو سلاح", "لأن الصوف غالي"], ans: 1, hint: "لماذا يرتدي صوفاً في عز الصيف؟", why: "المحقق شك بأن المعطف استُخدم لإخفاء جريمة أو آثار دماء." },
        { q: "رجل ادعى أن لصاً سرق حقيبته وهرب في زقاق 'مظلم تماماً' ورأى لون عيونه 'الأزرق'. لماذا كُشف؟", options: ["لأن اللص يرتدي نظارة", "لأنه لا يمكن رؤية لون العين في الظلام التام", "لأن اللص سريع"], ans: 1, hint: "الضوء والألوان.", why: "في الظلام التام لا يمكن تمييز ألوان العيون الدقيقة." },
        { q: "جريمة حدثت في الطابق الـ 50. المشتبه به قال إنه قفز من النافذة وهرب مشياً. لماذا هو كاذب؟", options: ["لأنه لا يملك حذاء", "لأن السقوط من الـ 50 يعني الموت حتماً", "لأن المصعد معطل"], ans: 1, hint: "الجاذبية والارتفاع.", why: "لأنه من المستحيل النجاة من سقطة من الطابق الـ 50." },
        { q: "ادعى شاهد أنه سمع الضحية يهمس باسم القاتل من خلف جدار عازل للصوت تماماً. لماذا هو كاذب؟", options: ["لأن الضحية مات فوراً", "لأن الجدار العازل يمنع سماع الهمس", "لأن الشاهد أصم"], ans: 1, hint: "وظيفة الجدار العازل.", why: "لأن الجدران العازلة للصوت تمنع انتقال الأصوات الضعيفة كالهمس." },
        { q: "وُجدت جثة وعليها آثار حرق بالشمس. المشتبه به قال إن الضحية كان في القبو طوال الأسبوع. لماذا كُشف؟", options: ["لأن القبو بارد", "لأن حرق الشمس لا يحدث في القبو المظلم", "لأن الضحية يحب الشمس"], ans: 1, hint: "أين تظهر حروق الشمس؟", why: "حروق الشمس تتطلب التعرض للأشعة، وهو ما لا يتوفر في القبو." },
        { q: "مات شخص بجرعة سم. المشتبه به قال إنه تذوق الطعام قبله ولم يمت. السم كان 'سريع المفعول'. لماذا هو القاتل؟", options: ["لأن المشتبه به لديه مناعة", "لأنه كاذب ولو تذوقه لمات معه", "لأن الطعام لذيذ"], ans: 1, hint: "سم سريع المفعول.", why: "لو تذوقه فعلاً لمات فوراً لأن السم سريع المفعول." },
        { q: "رجل مقتول بآلة حادة. المشتبه به (نجار) قال إنه كان يقطع الخشب بمنشار كهربائي صوته عالٍ جداً ولم يسمع صراخ الضحية بجانبه. لماذا قبضوا عليه؟", options: ["لأن المنشار معطل", "لأنه استخدم المنشار في القتل", "لأن رائحة الدم قوية"], ans: 1, hint: "المنشار وسيلة القتل.", why: "النجار استخدم صوت المنشار للتغطية على الجريمة أو استخدمه كأداة." },
        { q: "ادعى شخص أن لصاً كسر زجاج السيارة من 'الداخل' ليسرقها. لماذا شك المحقق؟", options: ["لأن اللص بالخارج عادة", "لأن كسر الزجاج من الداخل يعني أن الشخص كان بالسيارة", "لأن الزجاج قوي"], ans: 1, hint: "اتجاه الكسر.", why: "لأن اللص الذي يريد السرقة يكسر الزجاج من الخارج للداخل وليس العكس." },
        { q: "وُجدت جثة في الحمام. المشتبه به قال إنه كان يستحم بماء ساخن جداً والمرات كانت 'جافة' تماماً. لماذا هو كاذب؟", options: ["لأن الماء انقطع", "لأن البخار الناتج عن الماء الساخن يبلل المرايا حتماً", "لأن المرآة مكسورة"], ans: 1, hint: "البخار والأسطح الباردة.", why: "الاستحمام بماء ساخن يولد بخاراً يتكثف على المرايا ويجعلها رطبة." },
        { q: "رجل مقتول في غابة. المشتبه به قال إنه كان يصطاد طيوراً 'بالليل' باستخدام صقر الصيد. لماذا هو كاذب؟", options: ["لأن الصقور لا تصطاد في الليل (عمى ليلي)", "لأن الطيور نائمة", "لأن الغابة مخيفة"], ans: 0, hint: "متى يصطاد الصقر؟", why: "الصقور طيور نهارية ولا يمكنها الصيد في الظلام الدامس." },
    ],
    20: [ // مستوى 20 نقطة (50 قصة - جريمة غامضة)
        { q: "وُجد رجل مقتولاً في مكتبه. النافذة كانت مفتوحة والمطر يهطل بشدة. وُجدت آثار أقدام طينية 'جافة' تماماً على السجاد. لماذا كُشف القاتل؟", options: ["لأن الطين جف بسرعة", "لأن الطين الجاف يعني أن الجريمة حدثت قبل المطر أو أن القاتل زيف الأثر", "لأن السجاد نظيف"], ans: 1, hint: "مطر وطين جاف؟", why: "لو كانت الأقدام من المطر الحالي لكان الطين مبللاً، جفافه يعني كذب الرواية." },
        { q: "مات شخص بطلق ناري. المشتبه به قال إنه سمع الرصاصة 'بعد' أن رأى الضحية يسقط بـ 10 ثوانٍ والمسافة كانت 5 أمتار فقط. لماذا هو كاذب؟", options: ["لأن الصوت أسرع", "لأن المسافة قصيرة جداً ليكون هناك فرق زمن ملحوظ", "لأن الرصاصة صامتة"], ans: 1, hint: "سرعة الصوت والمسافة.", why: "في مسافة 5 أمتار، يصل الصوت فوراً تقريباً؛ فرق 10 ثوانٍ مستحيل منطقياً." },
        { q: "وُجدت جثة في الصحراء. القاتل مسح آثار أقدامه بفرشاة. لماذا قبض المحقق عليه؟", options: ["لأنه وجد الفرشاة", "لأن مسح الأثر يترك منطقة 'ناعمة مستوية' تختلف عن طبيعة الرمل المحيط", "لأن الرمل يتطاير"], ans: 1, hint: "شكل الرمل الممسوح.", why: "المساحة الممسوحة صناعياً تبرز بوضوح وسط الرمل الطبيعي المتعرج بفعل الرياح." },
        { q: "رجل مقتول بداخل غرفة تبريد (فريزر) والباب مقفل من الخارج. وُجدت آثار 'خدوش' من الداخل. المشتبه به (صاحب المستودع) قال إنه لم يفتح الباب منذ أسبوع. لماذا قبضوا عليه؟", options: ["لأن الضحية مات منذ يوم واحد فقط", "لأن الخدوش جديدة", "لأن المفتاح معه"], ans: 0, hint: "وقت الوفاة.", why: "لو كان الباب مغلقاً منذ أسبوع لمات الضحية وتحلل، لكن موته منذ يوم يعني أن أحداً أدخله حديثاً." },
        { q: "ادعى شخص أن لصاً سرق لوحة فنية 'زيتية' وخبأها تحت قميصه وهو يركض. اللوحة كانت مرسومة 'قبل ساعة'. لماذا كُشف؟", options: ["لأن اللوحة كبيرة", "لأن الألوان الزيتية تحتاج أياماً لتجف وستلطخ قميصه حتماً", "لأن اللوحة رخيصة"], ans: 1, hint: "خصائص الألوان الزيتية.", why: "الألوان الزيتية تظل رطبة لفترة طويلة، ووضعها تحت القميص سيدمر اللوحة ويلوث القاتل." },

    let used = new Set(), scores = { t1: 0, t2: 0 }, currentTeam = 1, currentStory = null, hintUsed = false;

    function startGame() {
        document.getElementById('nameT1').innerText = document.getElementById('t1').value || "فريق أ";
        document.getElementById('nameT2').innerText = document.getElementById('t2').value || "فريق ب";
        document.getElementById('setup').classList.remove('active');
        document.getElementById('gameArea').classList.add('active');
        updateTurn();
    }

    function updateTurn() {
        const name = currentTeam === 1 ? document.getElementById('nameT1').innerText : document.getElementById('nameT2').innerText;
        document.getElementById('turnTag').innerText = "دور فريق: " + name;
    }

    function loadStory(pts) {
        let avail = allStories[pts].filter(s => !used.has(s.q));
        if (!avail.length) return alert("انتهت الأسئلة!");
        currentStory = avail[Math.floor(Math.random() * avail.length)];
        used.add(currentStory.q);
        currentStory.basePoints = pts;
        hintUsed = false;
        document.getElementById('storyText').innerText = currentStory.q;
        document.getElementById('hintArea').style.display = "none";
        document.getElementById('explanation').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('hintBtn').style.display = "inline-block";
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        currentStory.options.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = "opt-btn"; b.innerText = o;
            b.onclick = () => check(i);
            optDiv.appendChild(b);
        });
        document.getElementById('levels').style.display = "none";
        document.getElementById('storyDisplay').style.display = "block";
    }

    function useHint() {
        hintUsed = true;
        document.getElementById('hintArea').innerText = "💡 تلميح: " + currentStory.hint;
        document.getElementById('hintArea').style.display = "block";
        document.getElementById('hintBtn').style.display = "none";
    }

    function check(idx) {
        const exp = document.getElementById('explanation');
        exp.style.display = "block";
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        let win = (idx === currentStory.ans);
        if(win) {
            let p = hintUsed ? currentStory.basePoints/2 : currentStory.basePoints;
            if(currentTeam === 1) scores.t1 += p; else scores.t2 += p;
            exp.innerHTML = "✅ صح! <br><small>" + currentStory.why + "</small>";
            exp.style.background = "var(--success)";
        } else {
            exp.innerHTML = "❌ خطأ! القاتل: " + currentStory.options[currentStory.ans] + "<br><small>" + currentStory.why + "</small>";
            exp.style.background = "var(--error)";
        }
        document.getElementById('s1').innerText = scores.t1;
        document.getElementById('s2').innerText = scores.t2;
        
        if (scores.t1 >= 100 || scores.t2 >= 100) {
            showWinner();
        } else {
            document.getElementById('nextBtn').style.display = "inline-block";
        }
    }

    function showWinner() {
        const winner = scores.t1 >= 100 ? document.getElementById('nameT1').innerText : document.getElementById('nameT2').innerText;
        document.getElementById('gameArea').style.display = "none";
        document.getElementById('winScreen').style.display = "block";
        document.getElementById('winnerName').innerText = winner;
        
        // تأثير الاحتفال
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }

    function resetTurn() {
        currentTeam = currentTeam === 1 ? 2 : 1;
        document.getElementById('box1').classList.toggle('active-turn');
        document.getElementById('box2').classList.toggle('active-turn');
        updateTurn();
        document.getElementById('levels').style.display = "block";
        document.getElementById('storyDisplay').style.display = "none";
    }
</script>
