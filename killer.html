<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي المحققين - النسخة الاحترافية</title>
    <style>
        :root { --danger: #ff4757; --gold: #ffa502; --bg: #0f172a; --card: #1e293b; --text: #f1f2f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 95%; max-width: 800px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); text-align: center; }
        
        .score-board { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .team-box { flex: 1; padding: 20px; border-radius: 15px; background: #2d3436; border: 3px solid transparent; transition: 0.3s; }
        .active-team { border-color: var(--gold); background: #1e293b; transform: scale(1.05); }
        .pts { font-size: 2.5em; color: var(--gold); font-weight: 900; }

        .levels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .lvl-btn { padding: 20px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .lvl-btn:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .lvl-btn span { display: block; font-size: 0.8em; opacity: 0.8; margin-top: 5px; }

        /* نافذة السؤال (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; color: #1e293b; width: 90%; max-width: 600px; padding: 30px; border-radius: 20px; text-align: right; }
        .q-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .hint-text { background: #f0fdf4; color: #166534; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none; border-right: 5px solid #22c55e; }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc; cursor: pointer; font-weight: bold; font-size: 1.1em; text-align: right; }
        .opt-btn:hover { border-color: var(--gold); background: #fffbeb; }
        
        .hint-btn { background: #8b5cf6; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .winner-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container" id="main-game">
    <h1 style="color:var(--gold)">🔍 تحدي المحققين: سباق الـ 150</h1>
    
    <div class="score-board">
        <div id="b0" class="team-box active-team">الفريق الأول<br><span class="pts" id="s0">0</span></div>
        <div id="b1" class="team-box">الفريق الثاني<br><span class="pts" id="s1">0</span></div>
    </div>

    <div class="levels">
        <button class="lvl-btn" style="background:#3b82f6" onclick="ask(10)">📁 جنحة <span>10 نقاط</span></button>
        <button class="lvl-btn" style="background:#f59e0b" onclick="ask(30)">📂 جريمة <span>30 نقطة</span></button>
        <button class="lvl-btn" style="background:#ef4444" onclick="ask(50)">🗄️ لغز معقد <span>50 نقطة</span></button>
    </div>
</div>

<div class="modal" id="q-modal">
    <div class="modal-content">
        <div class="q-header">
            <span id="q-pts" style="background:var(--gold); padding:5px 12px; border-radius:8px; font-weight:bold;">30ن</span>
            <button class="hint-btn" id="h-btn" onclick="showHint()">💡 تلميح (-50%)</button>
        </div>
        <h3 id="q-text" style="line-height:1.6"></h3>
        <div id="q-hint" class="hint-text"></div>
        <div id="options"></div>
        <div id="result" style="display:none; padding:15px; border-radius:10px; margin-top:15px; font-weight:bold;"></div>
        <button id="next-btn" class="opt-btn" style="background:#22c55e; color:white; display:none; border:none;" onclick="closeModal()">متابعة التحقيق ⬅️</button>
    </div>
</div>

<div class="winner-screen" id="win-screen">
    <h1 id="win-text" style="font-size:3em; color:var(--gold)"></h1>
    <button class="lvl-btn" style="background:var(--gold); color:black" onclick="location.reload()">لعبة جديدة</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
let scores = [0, 0], turn = 0, currentVal = 0, hintUsed = false;

// قاعدة بيانات الأسئلة - تم رفع الصعوبة
const db = {
    10: [
        {q: "ادعى شاهد رؤية القاتل بوضوح من مسافة 500 متر في ليلة 'قمر محاق' (ظلام دامس). لماذا كذب؟", h: "القمر المحاق لا يعطي أي ضوء.", o: ["لأن المسافة بعيدة جداً", "لأن المحاق يعني اختفاء ضوء القمر تماماً والرؤية مستحيلة", "لأن القاتل كان يرتدي قناعاً"], a: 1, w: "في ليلة المحاق، ينعدم الضوء الطبيعي تماماً، مما يجعل الرؤية عن بعد مستحيلة."},
        {q: "وُجدت جثة في غرفتها وبجانبها كوب قهوة 'مثلج' رغم أن المكيف مطفأ والجو حار. كيف عرفوا وقت الوفاة؟", h: "فكر في الوقت الذي يحتاجه السائل ليبرد.", o: ["لأن القهوة تبرد بسرعة", "لأن بقاء القهوة مثلجة يعني أن الوفاة حدثت فور تقديمها قبل أن تذوب", "لأن الضحية يحب القهوة الباردة"], a: 1, w: "القهوة المثلجة في جو حار تذوب خلال دقائق، بقاؤها مثلجة يحدد وقت الجريمة بدقة."}
    ],
    30: [
        {q: "مات رجل في سيارته وبجانبه رسالة انتحار. النوافذ مغلقة تماماً والمفتاح داخل 'جيب الضحية'. لماذا هي جريمة قتل؟", h: "كيف قفل القاتل السيارة ووضع المفتاح في جيب الضحية؟", o: ["لأن الرسالة مزورة", "لأن القاتل يملك نسخة ثانية وقفلها بجهاز التحكم عن بعد", "لأن الانتحار لا يكون في السيارة"], a: 1, w: "وجود المفتاح في جيب الضحية والسيارة مقفلة يعني أن شخصاً آخر قفلها من الخارج بنسخة أخرى."},
        {q: "عثر المحقق على جثة متصلبة تماماً (Rigor Mortis) بعد ساعة واحدة من الموت في غرفة دافئة. لماذا هذا مستحيل؟", h: "التصلب يحتاج لعدة ساعات في الظروف الطبيعية.", o: ["لأن التصلب يحتاج من 3 إلى 6 ساعات ليبدأ", "لأن الغرفة الدافئة تمنع التصلب", "لأن الضحية كان رياضياً"], a: 0, w: "التصلب الجنائي عملية كيميائية تأخذ وقتاً؛ ظهورها بعد ساعة يعني أن الجريمة حدثت قبل ذلك بكثير."}
    ],
    50: [
        {q: "وجدت جثة في قاع مسبح، والشرطة اكتشفت وجود 'ماء مالح' في رئتيه رغم أن المسبح ماؤه عذب. ماذا تستنتج؟", h: "الماء في الرئتين يحدد مكان الغرق الحقيقي.", o: ["لأن المسبح تلوث بالملح", "لأن الضحية غرق في البحر ثم نُقل للمسبح لتضليل التحقيق", "لأن الضحية كان يشرب ماءً مالحاً"], a: 1, w: "نوع الماء داخل الرئتين هو الدليل القاطع على مكان الغرق الفعلي؛ نقله للمسبح محاولة فاشلة لتغيير مسرح الجريمة."},
        {q: "خزنة مقفلة برقم سري، وُجدت عليها بصمات المشتبه به على 'كل الأرقام' بالتساوي وبوضوح شديد. لماذا يشك المحقق؟", h: "هل نلمس كل الأرقام عندما نفتح الخزنة عادةً؟", o: ["لأن القاتل نسي مسحها", "لأنها بصمات زرعها القاتل الحقيقي لتوريط المشتبه به (بصمات مصطنعة)", "لأن المشتبه به يملك أصابع كثيرة"], a: 1, w: "تساوي وضوح البصمات على كل الأرقام بشكل مثالي يوحي بأنها 'طُبعت' عمداً لتضليل العدالة."}
    ]
};

function ask(val) {
    if (db[val].length === 0) { alert("انتهت أسئلة هذا المستوى!"); return; }
    
    currentVal = val;
    hintUsed = false;
    // سحب السؤال وحذفه من المصفوفة فوراً
    window.curr = db[val].splice(Math.floor(Math.random() * db[val].length), 1)[0];
    
    document.getElementById('q-pts').innerText = val + "ن";
    document.getElementById('q-text').innerText = window.curr.q;
    document.getElementById('q-hint').style.display = 'none';
    document.getElementById('h-btn').disabled = false;
    document.getElementById('result').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('q-modal').style.display = 'flex';
    
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = "";
    window.curr.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => check(i);
        optDiv.appendChild(btn);
    });
}

function showHint() {
    document.getElementById('q-hint').innerText = "💡 تلميح: " + window.curr.h;
    document.getElementById('q-hint').style.display = 'block';
    document.getElementById('h-btn').disabled = true;
    hintUsed = true;
    document.getElementById('q-pts').innerText = (currentVal/2) + "ن (تلميح)";
}

function check(i) {
    const res = document.getElementById('result');
    res.style.display = 'block';
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    
    let earned = hintUsed ? currentVal / 2 : currentVal;
    
    if (i === window.curr.a) {
        res.innerText = "✅ تحليل عبقري! " + window.curr.w;
        res.style.background = "#dcfce7"; res.style.color = "#166534";
        scores[turn] += earned;
        confetti();
    } else {
        res.innerText = "❌ تحليل خاطئ! " + window.curr.w;
        res.style.background = "#fee2e2"; res.style.color = "#991b1b";
    }
    document.getElementById('next-btn').style.display = 'block';
    updateUI();
    if (scores[turn] >= 150) showWinner();
}

function closeModal() {
    document.getElementById('q-modal').style.display = 'none';
    turn = 1 - turn;
    updateUI();
}

function updateUI() {
    document.getElementById('s0').innerText = scores[0];
    document.getElementById('s1').innerText = scores[1];
    document.getElementById('b0').className = turn === 0 ? "team-box active-team" : "team-box";
    document.getElementById('b1').className = turn === 1 ? "team-box active-team" : "team-box";
}

function showWinner() {
    document.getElementById('win-screen').style.display = 'flex';
    document.getElementById('win-text').innerText = "🏆 فاز الفريق " + (turn === 0 ? "الأول" : "الثاني");
}
</script>

</body>
</html>
